<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#E8480A;--pd:#C03D08;--pp:#FFF2ED;--pm:#FDDDD2;
  --bg:#EDE5DC;--sur:#fff;--nav:#1C1410;
  --txt:#1C1410;--mut:#8A7E76;--brd:#DDD4CA;
  --grn:#22C55E;
  --sh1:0 1px 4px rgba(0,0,0,.09);--sh2:0 4px 18px rgba(0,0,0,.11)
}
html,body{height:100%;height:100dvh;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column}
/* NAV */
nav{background:var(--nav);padding:0 16px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.nl{display:flex;align-items:center;gap:11px}
.na{width:42px;height:42px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.na::after{content:'';width:11px;height:11px;background:var(--grn);border:2.5px solid var(--nav);border-radius:50%;position:absolute;bottom:0;right:0}
.nn{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.25}
.nn span{color:var(--p)}
.ns{font-size:11px;color:var(--grn);font-weight:600;display:flex;align-items:center;gap:4px;margin-top:1px}
.sd{width:5px;height:5px;background:var(--grn);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nb{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.6)}
.nbd{width:6px;height:6px;background:var(--grn);border-radius:50%}
/* CHAT BG */
.cbg{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 0 90px;scroll-behavior:smooth;background:var(--bg);background-image:radial-gradient(ellipse at 15% 10%,rgba(232,72,10,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(232,72,10,.04) 0%,transparent 55%)}
.cbg::-webkit-scrollbar{width:3px}
.cbg::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
.dsep{text-align:center;font-size:11px;font-weight:600;color:var(--mut);margin:4px 0 14px;display:flex;align-items:center;gap:10px;padding:0 20px}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.1)}
/* MSG ROWS */
.mr{display:flex;align-items:flex-end;gap:8px;padding:2px 14px;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.mr.user{flex-direction:row-reverse}
.mr+.mr{margin-top:2px}
.rav{width:30px;height:30px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-bottom:18px}
.bw{display:flex;flex-direction:column;max-width:min(74%,320px)}
.mr.user .bw{align-items:flex-end}
.bubble{padding:10px 14px;font-size:14px;line-height:1.58;word-break:break-word;box-shadow:var(--sh1)}
.mr.bot .bubble{background:var(--sur);color:var(--txt);border-radius:18px 18px 18px 4px}
.mr.bot .bubble strong{color:var(--p);font-weight:700}
.mr.user .bubble{background:var(--p);color:#fff;border-radius:18px 18px 4px 18px}
.bt{font-size:10px;color:var(--mut);margin-top:3px;padding:0 3px;display:flex;align-items:center;gap:3px}
.mr.user .bt{color:rgba(0,0,0,.35);justify-content:flex-end}
.tick{color:#60A5FA;font-size:11px}
/* OPTS */
.or{padding:6px 14px 4px 52px;display:flex;flex-direction:column;gap:6px;animation:mi .22s ease}
.ob{background:var(--sur);border:1.5px solid var(--pm);border-radius:22px;padding:9px 18px;font-size:13px;font-family:inherit;color:var(--pd);font-weight:600;cursor:pointer;text-align:left;transition:all .15s;align-self:flex-start;box-shadow:var(--sh1)}
.ob:hover{background:var(--p);border-color:var(--p);color:#fff;transform:translateY(-1px);box-shadow:var(--sh2)}
.ob:active{transform:scale(.97)}
/* TYPING */
.tr{display:flex;align-items:flex-end;gap:8px;padding:4px 14px;animation:mi .15s ease}
.tb{background:var(--sur);border-radius:18px 18px 18px 4px;padding:13px 16px;display:flex;align-items:center;gap:5px;box-shadow:var(--sh1)}
.tb span{width:7px;height:7px;background:#C0B4AC;border-radius:50%;animation:tb 1.3s infinite}
.tb span:nth-child(2){animation-delay:.15s}.tb span:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* DIAG CARD */
.dc{background:var(--sur);border-radius:18px;overflow:hidden;box-shadow:var(--sh2);margin:4px 14px 4px 52px;border:1px solid var(--brd);animation:mi .3s ease}
.dt{background:linear-gradient(135deg,#1C1410 0%,#2D1F18 100%);padding:14px 16px;display:flex;align-items:center;gap:12px}
.di{width:44px;height:44px;background:var(--p);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.dtit{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.dsub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;font-weight:500}
.db{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.ir{background:var(--pp);border:1px solid var(--pm);border-radius:12px;padding:11px 13px}
.il{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--p);margin-bottom:4px}
.iv{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.sr{display:flex;gap:6px;margin-top:7px}
.sp{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.sh{background:#FEE2E2;color:#991B1B}.sm{background:#FEF3C7;color:#92400E}.sl{background:#DCFCE7;color:#166534}
.stl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:4px}
.si{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--brd);font-size:13px;color:#3D3028;line-height:1.5}
.si:last-child{border-bottom:none;padding-bottom:0}
.sn{width:20px;height:20px;background:var(--nav);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
/* RESTART */
.rw{padding:6px 14px 4px 52px;animation:mi .25s ease}
.rb{background:var(--sur);border:1.5px solid var(--brd);border-radius:22px;padding:9px 18px;font-size:13px;font-family:inherit;color:var(--mut);cursor:pointer;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;box-shadow:var(--sh1)}
.rb:hover{background:var(--pp);color:var(--p);border-color:var(--pm)}
/* INPUT */
.ib{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.08);padding:10px 12px max(14px,env(safe-area-inset-bottom));display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 -4px 24px rgba(0,0,0,.07)}
.ii{flex:1;background:#F2EBE3;border:1.5px solid transparent;border-radius:26px;display:flex;align-items:center;padding:0 16px;transition:all .15s}
.ii:focus-within{background:#fff;border-color:var(--pm);box-shadow:0 0 0 3px rgba(232,72,10,.08)}
.ci{flex:1;border:none;background:transparent;padding:12px 0;font-size:15px;font-family:inherit;color:var(--txt);outline:none}
.ci::placeholder{color:#B0A49C}
.sb{width:46px;height:46px;background:var(--p);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,transform .1s,box-shadow .15s;box-shadow:0 3px 10px rgba(232,72,10,.4)}
.sb:hover{background:var(--pd);box-shadow:0 5px 16px rgba(232,72,10,.5)}
.sb:active{transform:scale(.92)}
.sb svg{width:18px;height:18px;fill:#fff;margin-left:2px}
</style>
</head>
<body>
<nav>
  <div class="nl">
    <div class="na">🚗</div>
    <div>
      <div class="nn">Car<span>Buddy</span></div>
      <div class="ns"><span class="sd"></span>AI Diagnosis Active</div>
    </div>
  </div>
  <div class="nb"><span class="nbd"></span>50+ issues covered</div>
</nav>
<div class="cbg" id="cbg">
  <div class="dsep">Today</div>
  <div id="chat"></div>
</div>
<div class="ib">
  <div class="ii"><input class="ci" id="inp" type="text" placeholder="Describe your car issue..." autocomplete="off"/></div>
  <button class="sb" id="sbtn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
<script>
var trees={
"car not starting":{icon:"🔑",title:"Car Not Starting",
  qd:function(t){
    if(t.includes("no fuel")||t.includes("empty")||t.includes("out of fuel")||t.includes("no petrol")||t.includes("no diesel")||t.includes("ran out"))return{issue:"Empty fuel tank",sev:"low",steps:["Add at least 2-3 litres of correct fuel","Wait 2 minutes then try starting","Turn ignition to ON 3 times before cranking to prime the pump","If still no start, fuel pump may need inspection"]};
    if(t.includes("clicking")||t.includes("rapid click"))return{issue:"Dead or weak battery",sev:"high",steps:["Jump-start the car to confirm","Test battery voltage (should be 12.6V+)","Check for corroded terminals","Replace battery if older than 3 years"]};
    if(t.includes("cranking")||t.includes("turns over"))return{issue:"Fuel or ignition system fault",sev:"med",steps:["Check fuel level and fuel pump pressure","Inspect spark plugs and ignition coils","Run OBD scan for fault codes"]};
    return null;
  },
  qs:[
    {q:"When you turn the key, does the engine crank (make a turning sound)?",opts:["Yes, cranks but won't start","No, nothing happens"]},
    {q:"Are the dashboard lights turning on?",opts:["Yes, lights are on","No, dashboard is dark"]},
    {q:"Do you hear any clicking sound?",opts:["Yes, rapid clicking","No sound at all"]},
    {q:"When was the battery last replaced?",opts:["Within a year","1-3 years ago","More than 3 years","Not sure"]}
  ],
  dx:function(a){
    if(a[0]==="No, nothing happens"&&a[1]==="No, dashboard is dark")return{issue:"Dead battery",sev:"high",steps:["Jump-start the car to confirm","Test battery voltage (should be 12.6V+)","Replace battery if older than 3 years","Check alternator output after replacement"]};
    if(a[0]==="Yes, cranks but won't start")return{issue:"Fuel or ignition system fault",sev:"med",steps:["Check fuel level and fuel pump pressure","Inspect spark plugs and ignition coils","Check for fuel injector clog","Run OBD scan for fault codes"]};
    return{issue:"Starter motor issue",sev:"med",steps:["Test starter relay and solenoid","Check battery terminals for corrosion","Have starter motor inspected","Check wiring connections to starter"]};
  }
},
"battery":{icon:"🔋",title:"Battery Drain",qd:function(){return null;},
  qs:[
    {q:"How many days does the car sit unused before the battery dies?",opts:["1-2 days","3-5 days","A week or more"]},
    {q:"How old is the current battery?",opts:["Less than 1 year","1-3 years","More than 3 years"]},
    {q:"Any aftermarket accessories? (dashcam, extra lights, alarms)",opts:["Yes","No"]},
    {q:"Does the car start fine after a jump start?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[1]==="More than 3 years")return{issue:"Aged battery — needs replacement",sev:"high",steps:["Replace battery (3+ years is past lifespan)","Check charging system after replacement","Test alternator output (13.5-14.5V running)","Inspect terminals for corrosion"]};
    if(a[2]==="Yes")return{issue:"Parasitic drain from accessories",sev:"med",steps:["Disconnect accessories overnight to test","Check dashcam/alarm power draw","Use a multimeter to find parasitic drain","Install battery cut-off switch if needed"]};
    return{issue:"Alternator or electrical leak",sev:"high",steps:["Test alternator output voltage","Check for parasitic current drain","Inspect fuses and relays","Have full electrical system tested"]};
  }
},
"engine overheating":{icon:"🌡️",title:"Engine Overheating",
  qd:function(t){
    if(t.includes("leak")||t.includes("leaking")||t.includes("dripping")||t.includes("puddle"))return{issue:"Coolant leak",sev:"high",steps:["Stop driving immediately — risk of engine damage","Check radiator hoses and clamps","Inspect water pump for leaks","Pressure test the cooling system"]};
    return null;
  },
  qs:[
    {q:"Is the temperature warning light on the dashboard lit up?",opts:["Yes","No, but temp gauge is high"]},
    {q:"Have you checked the coolant level recently?",opts:["Yes, it's fine","It was low","Haven't checked"]},
    {q:"Does it get worse when the AC is on?",opts:["Yes","No"]},
    {q:"Do you see any coolant leaking under the car?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[1]==="It was low"||a[3]==="Yes")return{issue:"Coolant leak",sev:"high",steps:["Stop driving immediately","Check radiator hoses and clamps","Inspect water pump for leaks","Pressure test the cooling system"]};
    if(a[2]==="Yes")return{issue:"Radiator fan or AC condenser issue",sev:"med",steps:["Check radiator fan operation with AC on","Clean radiator fins if clogged","Test fan motor and relay","Inspect AC condenser for blockage"]};
    return{issue:"Thermostat or radiator blockage",sev:"med",steps:["Test thermostat (may be stuck closed)","Flush and refill coolant system","Check radiator for internal blockage","Inspect water pump operation"]};
  }
},
"brake":{icon:"🛑",title:"Brake Issue",
  qd:function(t){
    if(t.includes("grind")||t.includes("scraping"))return{issue:"Brake pads completely worn — urgent",sev:"high",steps:["Do not drive until pads are replaced","Inspect rotors for scoring/damage","Replace pads and rotors if scored","Bleed brake fluid after service"]};
    if(t.includes("soft")||t.includes("spongy")||t.includes("sinking"))return{issue:"Brake fluid or master cylinder issue",sev:"high",steps:["Check brake fluid level immediately","Look for fluid leaks at all four wheels","Inspect master cylinder for failure","Bleed brakes if air in system"]};
    if(t.includes("squeak")||t.includes("squeal"))return{issue:"Brake pads need replacement",sev:"med",steps:["Replace brake pads","Inspect rotors for minimum thickness","Clean caliper slide pins","Test after replacement"]};
    return null;
  },
  qs:[
    {q:"What kind of sound do you hear when braking?",opts:["Squeaking / squealing","Grinding / metal on metal","No noise, just weak brakes"]},
    {q:"How does the brake pedal feel?",opts:["Normal","Soft / goes to the floor","Hard / stiff"]},
    {q:"When was the last brake service?",opts:["Within a year","1-2 years ago","More than 2 years ago"]},
    {q:"Does the car pull to one side when braking?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[0]==="Grinding / metal on metal")return{issue:"Brake pads completely worn — urgent",sev:"high",steps:["Do not drive until pads are replaced","Inspect rotors for scoring/damage","Replace pads and rotors if scored","Bleed brake fluid after service"]};
    if(a[1]==="Soft / goes to the floor")return{issue:"Brake fluid or master cylinder issue",sev:"high",steps:["Check brake fluid level immediately","Look for fluid leaks at all four wheels","Inspect master cylinder for failure","Bleed brakes if air in system"]};
    if(a[0]==="Squeaking / squealing")return{issue:"Brake pads need replacement",sev:"med",steps:["Replace brake pads","Inspect rotors for minimum thickness","Clean caliper slide pins","Test after replacement"]};
    return{issue:"Brake caliper or alignment issue",sev:"med",steps:["Check caliper on pulling side","Inspect brake hose for restriction","Check wheel alignment","Service both front calipers together"]};
  }
},
"ac not cooling":{icon:"❄️",title:"AC Not Cooling",
  qd:function(t){
    if(t.includes("noise")||t.includes("sound")||t.includes("noice")||t.includes("grinding")||t.includes("clicking")||t.includes("rattl")||t.includes("clunk")||t.includes("bang"))return{issue:"AC compressor issue",sev:"high",steps:["Stop using AC immediately to avoid further damage","Have the compressor clutch inspected by a mechanic","Check refrigerant pressure levels","Full AC system inspection recommended"]};
    if(t.includes("weak airflow")||t.includes("low airflow")||t.includes("no air"))return{issue:"Cabin air filter clogged",sev:"low",steps:["Replace cabin air filter (often a DIY job)","Check blower motor operation","Inspect evaporator for ice buildup","Clean evaporator if musty smell present"]};
    return null;
  },
  qs:[
    {q:"How is the airflow from the vents?",opts:["Strong airflow, just not cold","Weak airflow","No airflow at all"]},
    {q:"Did the cooling stop suddenly or gradually?",opts:["Stopped suddenly","Gradually got worse"]},
    {q:"Any unusual noise when AC is turned on?",opts:["Yes, clicking or grinding","No noise"]},
    {q:"When was the last AC service?",opts:["Within a year","1-2 years ago","More than 2 years"]}
  ],
  dx:function(a){
    if(a[0]==="Weak airflow")return{issue:"Cabin air filter clogged",sev:"low",steps:["Replace cabin air filter","Check blower motor operation","Inspect evaporator for ice buildup","Clean evaporator if musty smell"]};
    if(a[2]==="Yes, clicking or grinding")return{issue:"AC compressor issue",sev:"high",steps:["Stop using AC to avoid further damage","Have compressor clutch inspected","Check refrigerant pressure","Full AC system inspection recommended"]};
    if(a[0]==="Strong airflow, just not cold"&&a[1]==="Stopped suddenly")return{issue:"Refrigerant leak or compressor failure",sev:"high",steps:["Check refrigerant pressure","Look for oily residue near AC lines","Have system leak-tested","Recharge refrigerant after fixing leak"]};
    return{issue:"Low refrigerant / AC service overdue",sev:"med",steps:["Get AC system recharged","Check for slow refrigerant leak","Inspect condenser for damage","Service AC system annually"]};
  }
},
"check engine":{icon:"⚠️",title:"Check Engine Light",qd:function(){return null;},
  qs:[
    {q:"Is the car driving and performing normally?",opts:["Yes, feels normal","No, something feels off"]},
    {q:"Any noticeable loss of power or rough running?",opts:["Yes","No"]},
    {q:"Has fuel consumption increased recently?",opts:["Yes, noticeably","No change"]},
    {q:"Do you have access to an OBD scanner?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[1]==="Yes")return{issue:"Serious engine/emission fault — scan needed",sev:"high",steps:["Read OBD fault codes immediately","Check for misfires (P030X codes)","Inspect spark plugs and coils","Do not ignore — can damage catalytic converter"]};
    if(a[2]==="Yes, noticeably")return{issue:"Fuel system or oxygen sensor issue",sev:"med",steps:["Scan OBD codes (look for O2 sensor codes)","Check mass airflow sensor","Inspect fuel injectors","Check for vacuum leaks"]};
    return{issue:"Minor sensor or emission fault",sev:"low",steps:["Scan with OBD reader for specific code","Check fuel cap is tight (common cause)","Monitor for other symptoms","Clear code and see if it returns"]};
  }
},
"car jerking":{icon:"⚡",title:"Car Jerking",qd:function(){return null;},
  qs:[
    {q:"When does the jerking happen?",opts:["During acceleration","At constant speed","Both"]},
    {q:"Is the fuel level low?",opts:["Yes, quite low","No, tank has fuel"]},
    {q:"When was the last full service done?",opts:["Within 6 months","6-12 months ago","More than a year ago"]},
    {q:"Any warning lights showing?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[0]==="During acceleration")return{issue:"Fuel delivery or ignition issue",sev:"med",steps:["Check spark plugs (replace if old)","Inspect fuel injectors","Check fuel pressure","Clean throttle body"]};
    if(a[0]==="At constant speed")return{issue:"Injector or sensor issue",sev:"med",steps:["Check MAF sensor and clean it","Inspect fuel injectors for clogging","Check TPS sensor","Scan OBD for misfire codes"]};
    return{issue:"Multiple causes likely — service overdue",sev:"med",steps:["Full OBD diagnostic scan","Replace spark plugs and air filter","Check fuel pump pressure","Inspect transmission mounts"]};
  }
},
"smoke":{icon:"💨",title:"Exhaust Smoke",
  qd:function(t){
    if(t.includes("white smoke"))return{issue:"Coolant burning — possible head gasket failure",sev:"high",steps:["Stop driving immediately","Check coolant level and look for milky oil on dipstick","Have a head gasket compression test done","Do not continue driving"]};
    if(t.includes("black smoke"))return{issue:"Rich fuel mixture — fuel system issue",sev:"med",steps:["Check air filter (may be clogged)","Inspect fuel injectors for leaking","Check O2 sensors and MAF sensor","Scan OBD for fuel trim codes"]};
    if(t.includes("blue smoke")||t.includes("burning oil"))return{issue:"Engine oil burning — piston rings / valve seals",sev:"high",steps:["Check engine oil level daily","Compression test to check piston rings","Valve stem seal replacement may be needed"]};
    return null;
  },
  qs:[
    {q:"What color is the smoke?",opts:["White","Black","Blue / bluish-grey"]},
    {q:"When does the smoke appear?",opts:["Only on cold start","All the time","Under hard acceleration"]},
    {q:"Is the engine overheating?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[0]==="White"&&a[1]==="All the time")return{issue:"Coolant burning — head gasket suspect",sev:"high",steps:["Check coolant level frequently","Look for milky oil on dipstick","Have head gasket compression test done","Do not continue driving"]};
    if(a[0]==="White"&&a[1]==="Only on cold start")return{issue:"Normal condensation — likely fine",sev:"low",steps:["Monitor if smoke stops after warm-up","If smoke persists, check coolant level","Should clear within 2-3 minutes","No action needed if car warms up fine"]};
    if(a[0]==="Black")return{issue:"Rich fuel mixture — fuel system issue",sev:"med",steps:["Check air filter","Inspect fuel injectors for leaking","Check O2 sensors and MAF sensor","Scan OBD for fuel trim codes"]};
    return{issue:"Engine oil burning — piston rings / valve seals",sev:"high",steps:["Check engine oil level daily","Inspect for oil leaks first","Compression test to check piston rings","Valve stem seal replacement may be needed"]};
  }
},
"vibration":{icon:"〰️",title:"Car Vibration",qd:function(){return null;},
  qs:[
    {q:"At what speed does the vibration occur?",opts:["60-80 km/h","Above 100 km/h","All speeds","Only when braking"]},
    {q:"Is the vibration felt in the steering wheel?",opts:["Yes, in steering wheel","Through the seat / floor"]},
    {q:"When were tyres last balanced?",opts:["Recently (< 6 months)","Over a year ago","Never / not sure"]}
  ],
  dx:function(a){
    if(a[0]==="Only when braking")return{issue:"Warped brake discs",sev:"med",steps:["Have brake rotors measured for warping","Resurface or replace rotors as needed","Replace brake pads at same time","Check caliper operation"]};
    if(a[1]==="Yes, in steering wheel")return{issue:"Wheel balance or alignment issue",sev:"med",steps:["Get all 4 wheels balanced","Check wheel alignment","Inspect tie rod ends and ball joints","Check for bent wheel rim"]};
    return{issue:"Tyre or suspension issue",sev:"med",steps:["Inspect tyres for uneven wear","Check tyre pressure on all four wheels","Inspect suspension components","Have wheel balance and alignment checked"]};
  }
},
"steering":{icon:"🎡",title:"Steering Issue",
  qd:function(t){
    if(t.includes("noise")||t.includes("whine")||t.includes("groan"))return{issue:"Power steering pump failing",sev:"high",steps:["Have PS pump pressure tested","Check fluid for contamination","Inspect PS hose for leaks","Pump replacement likely needed"]};
    return null;
  },
  qs:[
    {q:"When does the steering feel hard or heavy?",opts:["Always","Only at low speed / parking","Only when turning sharply"]},
    {q:"Have you checked the power steering fluid level?",opts:["Yes, it's fine","It was low","Haven't checked"]},
    {q:"Any noise when turning the steering wheel?",opts:["Yes, whining or groaning","No noise"]}
  ],
  dx:function(a){

function mapInput(t){
  var raw=t;
  t=" "+t.toLowerCase().replace(/[^\w\s]/g," ")+" ";
  var h=function(w){return t.includes(w);};
  var a=function(){for(var i=0;i<arguments.length;i++)if(t.includes(arguments[i]))return true;return false;};
  // Smell triggers
  if(a("burning rubber","burning tyre","burning tire","smell of rubber","smell rubber","smells like rubber","burning wood","clutch smell","burning clutch","burning oil","oil smell","exhaust smell","petrol smell","fuel smell","smells like petrol","smells like fuel","smells like gas","sweet smell","smells sweet","sulphur","rotten egg","egg smell","mildew","musty smell","musty","exhaust fumes inside","fumes inside","carbon monoxide","smell inside car","bad smell","strange smell","weird smell","odour","odor"))return"smell diagnosis";
  // Sound triggers
  if(a("knocking sound","banging sound","clicking sound","popping sound","grinding sound","squealing sound","squeaking sound","hissing sound","rattling sound","clunking sound","humming sound","whirring sound","sputtering sound","backfire","backfiring","makes noise","strange noise","weird noise","unusual noise","loud noise","noise from car","car making noise","hear a sound","hear noise","what sound","what noise"))return"sound diagnosis";
  if(a("no air from vents","vents not working","blower not working","no airflow from","air not coming","fan not working","heater not blowing","no heat from vents"))return"no airflow";
  // Touch/feel triggers
  if(a("bouncy ride","unstable ride","car bouncing","rough ride","body roll","leans in corners","rolls in corners","seat vibrates","seat shakes","feels loose","handling feels"))return"touch feel diagnosis";
  // Original + extended triggers
  // Clutch — broad natural language matching
  var hasBoth=function(w1,w2){return t.includes(w1)&&t.includes(w2);};
  if(a("clutch slip","slipping clutch","revving but not","rpm high but")||hasBoth("clutch","slip")||hasBoth("clutch","not moving")||hasBoth("rpm","not moving"))return"clutch slipping";
  if(a("clutch hard","clutch heavy","clutch stiff","heavy clutch","hard clutch","clutch pedal hard","clutch become hard","clutch gone hard","clutch getting hard","clutch is hard","pedal hard","pedal heavy","pedal stiff")||hasBoth("clutch","hard")||hasBoth("clutch","heavy")||hasBoth("clutch","stiff")||hasBoth("clutch","difficult")||hasBoth("clutch","tight"))return"clutch hard";
  if(a("clutch not return","clutch stuck","clutch not coming","clutch floor","pedal stuck","pedal not coming","pedal not return")||hasBoth("clutch","stuck")||hasBoth("pedal","stuck")||hasBoth("clutch","not come back")||hasBoth("clutch","on floor"))return"clutch not returning";
  // Brake pedal specifics
  if(a("brake pedal hard","hard brake pedal","stiff brake pedal","brake booster")||hasBoth("brake","booster")||(hasBoth("brake","hard")&&!t.includes("grinding")&&!t.includes("squeal")))return"brake pedal hard";
  if(a("brake soft","soft brake","sinking pedal","pedal sink","brake going down","pedal going down")||hasBoth("brake","soft")||hasBoth("brake","sinking")||hasBoth("pedal","sinking")||hasBoth("brake","low"))return"brake pedal soft";
  if(a("pulling","car pull","pulls left","pulls right")||hasBoth("car","pull")||hasBoth("pulling","side"))return"car pulling braking";
  if(a("wheel lock","wheel locking","skidding","abs light","brakes lock")||hasBoth("wheel","lock")||hasBoth("abs","light"))return"wheel lock";
  // Gear issues
  if(a("gear not","not shifting","gear stuck","gear hard","gear engage","grinding gear")||hasBoth("gear","not")||hasBoth("gear","stuck")||hasBoth("gear","hard")||hasBoth("cannot","gear")||hasBoth("gear","engage"))return"gear not shifting";
  if(a("automatic delay","auto gear","transmission delay","gear jerk","gearbox delay","auto transmission")||hasBoth("automatic","delay")||hasBoth("auto","jerk")||hasBoth("transmission","delay"))return"automatic gear delay";
  // Other mechanical
  if(a("suspension","thud","clunk on bump","bump noise","pothole noise","shock absorber")||hasBoth("noise","bump")||hasBoth("noise","pothole"))return"suspension noise";
  if(a("misfire","misfiring","engine shake","rough idle","shaking engine")||hasBoth("engine","misfire")||hasBoth("engine","shake")||hasBoth("rough","idle"))return"engine misfire";
  if(a("shuts off","shut off","dies while","stall","stops while driving","engine dies")||hasBoth("engine","die")||hasBoth("car","stall")||hasBoth("car","shut off"))return"car shuts off";
  if(a("no response","not responding","accelerator not","no acceleration")||hasBoth("accelerator","no response")||hasBoth("pressing","no response")||(hasBoth("no","response")&&!t.includes("start")))return"engine no response";
  if(a("ac intermittent","ac comes and goes","ac stops","intermittent cool","ac on and off","sometimes cool")||hasBoth("ac","intermittent")||hasBoth("ac","sometimes"))return"ac intermittent";
  // Car not starting
  if(a("not starting","won't start","wont start","not start","car dead","wont crank","won't crank")||hasBoth("car","not start")||hasBoth("car","won't")||hasBoth("engine","not start")||hasBoth("won't","start"))return"car not starting";
  if(a("battery","drain")||hasBoth("battery","dead")||hasBoth("battery","flat")||hasBoth("battery","not charge"))return"battery";
  if(a("overheat","temperature high","running hot","engine heat")||hasBoth("engine","hot")||hasBoth("temp","high")||hasBoth("overheating","car"))return"engine overheating";
  if(h("brake ")||h(" braking")||h("brakes"))return"brake";
  if(a("ac not","air conditioning","air con","not cooling","no cooling")||(t.includes(" ac ")&&a("not work","noise","problem","compressor")))return"ac not cooling";
  if(a("check engine","engine light","warning light")||hasBoth("engine","light")||hasBoth("check","engine"))return"check engine";
  if(a("jerk","jolting")||hasBoth("car","jerk"))return"car jerking";
  if(a("smoke","exhaust fume")||hasBoth("smoke","exhaust")||hasBoth("smoke","car"))return"smoke";
  if(a("vibrat","shaking","shake")||hasBoth("car","vibrate")||hasBoth("steering","shake"))return"vibration";
  if(a("steering","hard to turn","heavy steering")||hasBoth("steering","problem")||hasBoth("steering","issue"))return"steering";
  if(a("lean","tilt","one side low","lopsided")||hasBoth("car","lean")||hasBoth("car","tilt"))return"car leaning";
  if(a("differential","diff noise","rear noise","noise from rear")||hasBoth("rear","noise")||hasBoth("diff","noise"))return"differential noise";
  if(a("fuse blow","fuse keep","blowing fuse")||hasBoth("fuse","blow")||hasBoth("fuse","keep"))return"fuse blowing";
  if(a("steering vibrat","steering shake","high speed vibrat","highway shake")||hasBoth("steering","vibrat"))return"steering vibration speed";
  if(a("vibrat when braking","shudder when braking","braking vibrat","pulsating brake")||hasBoth("vibrat","brake")||hasBoth("shudder","brake"))return"vibration braking";
  return null;
}

function makeCard(icon,title,sub,issueVal,sc,sl,steps){
  var sh=steps.map(function(s,i){return'<div class="si"><div class="sn">'+(i+1)+'</div><div>'+s+'</div></div>';}).join('');
  return '<div class="dc"><div class="dt"><div class="di">'+icon+'</div><div><div class="dtit">'+title+'</div><div class="dsub">'+sub+'</div></div></div>'+
    '<div class="db"><div class="ir"><div class="il">Most likely issue</div><div class="iv">'+issueVal+'</div><div class="sr"><span class="sp '+sc+'">'+sl+'</span></div></div>'+
    '<div><div class="stl">Recommended actions</div>'+sh+'</div></div></div>';
}

function renderCard(tree,r){
  var sc=r.sev==="high"?"sh":r.sev==="med"?"sm":"sl";
  var sl=r.sev==="high"?"Urgent — see mechanic soon":r.sev==="med"?"Moderate priority":"Minor issue";
  var c=document.getElementById("chat"),w=document.createElement("div");
  w.innerHTML=makeCard(tree.icon,tree.title,"Diagnosis complete",r.issue,sc,sl,r.steps);
  c.appendChild(w.firstChild);sd();
}

function showDiag(){
  var t=st.tree,r=t.dx(st.ans);
  addMsg("Got it! Here is my diagnosis:","bot");
  setTimeout(function(){renderCard(t,r);setTimeout(addRestart,200);},150);
  st.phase="done";
}

function pickOpt(opt){
  addMsg(opt,"user");
  st.ans.push(opt);st.qi++;
  var t=st.tree;
  setTimeout(function(){
    if(st.qi<t.qs.length){
      var q=t.qs[st.qi];
      addMsg("<strong>"+q.q+"</strong>","bot");
      setTimeout(function(){showOpts(q.opts);},80);
    }else{showDiag();}
  },400);
}

function handleFollowUp(text){
  var t=text.toLowerCase();
  var h=function(w){return t.includes(w);};
  var newIssue=!h("my car")&&!h(" it ")&&!h("still")&&!h("but ")&&!h("the car")&&!h("fuel")&&!h("no ")&&!h("because")&&!h("that")&&!h("this")&&!h("why")&&!h("you")&&!h("already")&&!h("tried")&&!h("changed")&&!h("replaced");
  if(newIssue)return false;
  showTyping();
  setTimeout(function(){
    rmTyping();
    var c=document.getElementById("chat"),w;
    if(h("fuel")||h("no fuel")||h("empty")||h("petrol")||h("diesel")||h("ran out")){
      addMsg("Ah — no fuel would definitely cause a no-start! Here is what to do:","bot");
      setTimeout(function(){
        w=document.createElement("div");
        w.innerHTML=makeCard("⛽","Empty Fuel Tank","Simple fix","Car out of fuel","sl","Easy fix",["Add at least 2-3 litres of the correct fuel (petrol or diesel)","Wait 2 minutes after filling before cranking — lets fuel pump prime","Turn ignition to ON (not start) 3 times before cranking to prime the pump","If still no start, visit your nearest Instant Mechanic partner garage — running dry can damage the fuel pump"]);
        c.appendChild(w.firstChild);setTimeout(addRestart,200);sd();
      },150);
    }else if((h("battery")||h("new battery"))&&st.key==="car not starting"){
      addMsg("Since the battery has been replaced and it is still not starting, the issue is likely deeper:","bot");
      setTimeout(function(){
        w=document.createElement("div");
        w.innerHTML=makeCard("🔑","Post-Battery Replacement","Advanced diagnosis","Starter motor, alternator, or ignition fault","sh","Urgent — see mechanic soon",["Test the starter motor — listen for clicking or silence when turning the key","Check alternator output (should be 13.5-14.5V with engine running)","Inspect ignition switch and immobiliser system","Scan OBD for fault codes — may reveal a hidden electrical fault","Visit your nearest Instant Mechanic partner garage for a full electrical system check"]);
        c.appendChild(w.firstChild);setTimeout(addRestart,200);sd();
      },150);
    }else if((h("pad")||h("brake pad"))&&st.key==="brake"){
      addMsg("Since the brake pads have been replaced and the issue persists, the problem is likely with the rotors or calipers:","bot");
      setTimeout(function(){
        w=document.createElement("div");
        w.innerHTML=makeCard("🛑","Post-Pad Replacement","Further inspection needed","Warped rotor or seized caliper","sm","Moderate priority",["Inspect brake rotors for warping or scoring","Check caliper pistons for seizure on both sides","Measure rotor thickness — may be below minimum","Visit your nearest Instant Mechanic partner garage for a full brake inspection"]);
        c.appendChild(w.firstChild);setTimeout(addRestart,200);sd();
      },150);
    }else if((h("ac")||h("recharge"))&&st.key==="ac not cooling"){
      addMsg("If the AC has been recharged and it is still not cooling, there is likely a leak or compressor fault:","bot");
      setTimeout(function(){
        w=document.createElement("div");
        w.innerHTML=makeCard("❄️","Post-Recharge AC Issue","Leak or compressor fault","Refrigerant leak or compressor failure","sh","Urgent — see mechanic soon",["Have the system pressure-tested for refrigerant leaks","Inspect AC compressor clutch engagement","Check condenser and evaporator for damage","Visit your nearest Instant Mechanic partner garage for a full AC diagnostic"]);
        c.appendChild(w.firstChild);setTimeout(addRestart,200);sd();
      },150);
    }else if(h("overheat")||h("too hot")){
      addMsg("Overheating can cause starting issues or stalling. Let the engine cool completely first, then check the coolant level. If the problem continues, please <strong>visit your nearest Instant Mechanic partner garage</strong> for a cooling system check.","bot");
      setTimeout(addRestart,300);
    }else{
      addMsg("Thanks for the extra detail. Based on what you have described, this needs a hands-on inspection. Please <strong>visit your nearest Instant Mechanic partner garage</strong> — our mechanics will run a full diagnostic and get it sorted quickly.","bot");
      setTimeout(addRestart,300);
    }
    st.phase="done";
  },700);
  return true;
}

function processInput(text){
  if(st.phase==="done"){if(handleFollowUp(text))return;}
  var key=mapInput(text);
  if(!key){
    showTyping();
    setTimeout(function(){rmTyping();addMsg("I am not able to diagnose that specific issue remotely. Please <strong>visit your nearest Instant Mechanic partner garage</strong> for a full detailed car inspection — our trained mechanics will identify and fix the problem quickly.","bot");},700);
    return;
  }
  st.key=key;st.tree=trees[key];st.qi=0;st.ans=[];st.phase="questioning";
  var early=trees[key].qd?trees[key].qd(text.toLowerCase()):null;
  showTyping();
  setTimeout(function(){
    rmTyping();
    if(early){
      addMsg("Got it — based on what you described, I can already identify the issue.","bot");
      setTimeout(function(){
        renderCard(st.tree,early);
        setTimeout(function(){
          addMsg("Does this match your issue? If you want a more detailed walkthrough, just say <strong>ask me questions</strong>.","bot");
          setTimeout(addRestart,200);
        },200);
      },150);
      st.phase="done";
    }else{
      var q=st.tree.qs[0];
      addMsg("<strong>"+q.q+"</strong>","bot");
      setTimeout(function(){showOpts(q.opts);},80);
    }
  },600);
}

function sendMsg(){
  var inp=document.getElementById("inp"),val=inp.value.trim();
  if(!val)return;inp.value="";addMsg(val,"user");processInput(val);
}

function resetAll(){
  document.getElementById("chat").innerHTML="";
  st={phase:"idle",key:null,tree:null,qi:0,ans:[]};
  setTimeout(function(){addMsg("What else can I help you diagnose? Describe your car issue below.","bot");},150);
}

document.getElementById("sbtn").addEventListener("click",sendMsg);
document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter")sendMsg();});

setTimeout(function(){addMsg("Hi! I am <strong>CarBuddy</strong> — describe your car issue, or tell me about any unusual <strong>noise</strong>, <strong>smell</strong>, or <strong>feeling</strong> from your car and I will diagnose it right away.","bot");},300);
</script>
