<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBuddy — AI Car Diagnosis</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#E8480A;--pd:#C03D08;--pp:#FFF2ED;--pm:#FDDDD2;
  --bg:#EDE5DC;--sur:#fff;--nav:#1C1410;
  --txt:#1C1410;--mut:#8A7E76;--brd:#DDD4CA;
  --grn:#22C55E;
  --sh1:0 1px 4px rgba(0,0,0,.09);--sh2:0 4px 18px rgba(0,0,0,.11)
}
html,body{height:100%;height:100dvh;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column}
nav{background:var(--nav);padding:0 12px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.nl{display:flex;align-items:center;gap:9px}
.na{width:36px;height:36px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative}
.na::after{content:'';width:9px;height:9px;background:var(--grn);border:2px solid var(--nav);border-radius:50%;position:absolute;bottom:0;right:0}
.nn{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.2}
.nn span{color:var(--p)}
.ns{font-size:10px;color:var(--grn);font-weight:600;display:flex;align-items:center;gap:3px;margin-top:1px}
.sd{width:5px;height:5px;background:var(--grn);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nb{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:4px 9px;font-size:10px;font-weight:600;color:rgba(255,255,255,.6)}
.nbd{width:5px;height:5px;background:var(--grn);border-radius:50%}
.cbg{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 0 78px;scroll-behavior:smooth;background:var(--bg)}
.cbg::-webkit-scrollbar{width:2px}
.cbg::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
.dsep{text-align:center;font-size:10px;font-weight:600;color:var(--mut);margin:4px 0 10px;display:flex;align-items:center;gap:8px;padding:0 14px}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.1)}
.mr{display:flex;align-items:flex-end;gap:6px;padding:2px 10px;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mr.user{flex-direction:row-reverse}
.mr+.mr{margin-top:2px}
.rav{width:26px;height:26px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-bottom:16px}
.bw{display:flex;flex-direction:column;max-width:min(80%,310px)}
.mr.user .bw{align-items:flex-end}
.bubble{padding:8px 12px;font-size:13px;line-height:1.5;word-break:break-word;box-shadow:var(--sh1)}
.mr.bot .bubble{background:var(--sur);color:var(--txt);border-radius:16px 16px 16px 4px}
.mr.bot .bubble strong{color:var(--p);font-weight:700}
.mr.user .bubble{background:var(--p);color:#fff;border-radius:16px 16px 4px 16px}
.bt{font-size:9px;color:var(--mut);margin-top:2px;padding:0 2px;display:flex;align-items:center;gap:2px}
.mr.user .bt{color:rgba(0,0,0,.35);justify-content:flex-end}
.tick{color:#60A5FA;font-size:10px}
.or{padding:4px 10px 4px 42px;display:flex;flex-direction:row;flex-wrap:wrap;gap:5px;animation:mi .22s ease}
.ob{background:var(--sur);border:1.5px solid var(--pm);border-radius:16px;padding:7px 13px;font-size:12px;font-family:inherit;color:var(--pd);font-weight:600;cursor:pointer;transition:all .15s;box-shadow:var(--sh1)}
.ob:active{background:var(--p);border-color:var(--p);color:#fff;transform:scale(.97)}
@media(hover:hover){.ob:hover{background:var(--p);border-color:var(--p);color:#fff}}
.tr{display:flex;align-items:flex-end;gap:6px;padding:3px 10px;animation:mi .15s ease}
.tb{background:var(--sur);border-radius:16px 16px 16px 4px;padding:10px 14px;display:flex;align-items:center;gap:4px;box-shadow:var(--sh1)}
.tb span{width:6px;height:6px;background:#C0B4AC;border-radius:50%;animation:tb 1.3s infinite}
.tb span:nth-child(2){animation-delay:.15s}.tb span:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.dc{background:var(--sur);border-radius:14px;overflow:hidden;box-shadow:var(--sh2);margin:4px 10px 4px 42px;border:1px solid var(--brd);animation:mi .3s ease}
.dt{background:linear-gradient(135deg,#1C1410 0%,#2D1F18 100%);padding:10px 12px;display:flex;align-items:center;gap:10px}
.di{width:36px;height:36px;background:var(--p);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.dtit{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px}
.dsub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px;font-weight:500}
.db{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.ir{background:var(--pp);border:1px solid var(--pm);border-radius:10px;padding:8px 10px}
.il{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--p);margin-bottom:3px}
.iv{font-size:13px;font-weight:700;color:var(--txt);line-height:1.35}
.sr{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.sp{font-size:10px;font-weight:700;padding:2px 8px;border-radius:14px}
.sh{background:#FEE2E2;color:#991B1B}.sm{background:#FEF3C7;color:#92400E}.sl{background:#DCFCE7;color:#166534}
.stl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:3px}
.si{display:flex;gap:7px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px;color:#3D3028;line-height:1.4}
.si:last-child{border-bottom:none;padding-bottom:0}
.sn{width:18px;height:18px;min-width:18px;background:var(--nav);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.rw{padding:4px 10px 4px 42px;animation:mi .25s ease}
.rb{background:var(--sur);border:1.5px solid var(--brd);border-radius:16px;padding:7px 14px;font-size:12px;font-family:inherit;color:var(--mut);cursor:pointer;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;box-shadow:var(--sh1)}
.rb:active{background:var(--pp);color:var(--p);border-color:var(--pm)}
.ib{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(0,0,0,.08);padding:8px 10px max(12px,env(safe-area-inset-bottom));display:flex;align-items:center;gap:8px;z-index:200;box-shadow:0 -3px 20px rgba(0,0,0,.06)}
.ii{flex:1;background:#F2EBE3;border:1.5px solid transparent;border-radius:22px;display:flex;align-items:center;padding:0 14px;transition:all .15s}
.ii:focus-within{background:#fff;border-color:var(--pm);box-shadow:0 0 0 3px rgba(232,72,10,.08)}
.ci{flex:1;border:none;background:transparent;padding:10px 0;font-size:14px;font-family:inherit;color:var(--txt);outline:none}
.ci::placeholder{color:#B0A49C}
.sb{width:40px;height:40px;background:var(--p);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,transform .1s,box-shadow .15s;box-shadow:0 3px 10px rgba(232,72,10,.4)}
.sb:active{transform:scale(.92)}
.sb svg{width:16px;height:16px;fill:#fff;margin-left:2px}
/* ── ACCORDION (symptoms + repair) ── */
.acc{margin-top:6px;border-top:1px solid var(--brd);padding-top:6px}
.acc-btn{width:100%;background:none;border:none;padding:7px 0;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;-webkit-tap-highlight-color:transparent}
.acc-btn:active{color:var(--p)}
.acc-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{display:none;padding:4px 0 2px}
.acc-body.open{display:block}
.acc-sym{list-style:none;display:flex;flex-direction:column;gap:3px}
.acc-sym li{font-size:11px;color:var(--txt);line-height:1.4;padding:3px 0 3px 14px;position:relative}
.acc-sym li::before{content:"✓";position:absolute;left:0;color:var(--grn);font-weight:700;font-size:10px}
.acc-rep{list-style:none;display:flex;flex-direction:column;gap:4px;counter-reset:rep}
.acc-rep li{font-size:11px;color:var(--txt);line-height:1.4;padding:3px 0 3px 20px;position:relative;counter-increment:rep}
.acc-rep li::before{content:counter(rep);position:absolute;left:0;width:14px;height:14px;background:var(--p);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;top:4px}
.acc-warn{font-size:10px;color:#991B1B;background:#FEE2E2;border-radius:6px;padding:5px 8px;margin-top:4px;line-height:1.4}
</style>
</head>
<body>
<nav>
  <div class="nl">
    <div class="na">🚗</div>
    <div>
      <div class="nn">Car<span>Buddy</span></div>
      <div class="ns"><span class="sd"></span>AI Diagnosis Active</div>
    </div>
  </div>
  <div class="nb"><span class="nbd"></span>All car problems covered</div>
</nav>
<div class="cbg" id="cbg">
  <div class="dsep">Today</div>
  <div id="chat"></div>
</div>
<div class="ib">
  <div class="ii"><input class="ci" id="inp" type="text" placeholder="Describe your car issue..." autocomplete="off"/></div>
  <button class="sb" id="sbtn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
<script>
var trees={

/* ── ORIGINAL TREES (kept intact) ────────────────────────────────────── */

"car not starting":{icon:"🔑",title:"Car Not Starting",
  qd:function(t){
    if(t.includes("no fuel")||t.includes("empty")||t.includes("out of fuel")||t.includes("no petrol")||t.includes("no diesel")||t.includes("ran out"))return{issue:"Empty fuel tank",sev:"low",spot:true,steps:["Add at least 2-3 litres of correct fuel","Wait 2 minutes then try starting","Turn ignition to ON 3 times before cranking to prime the pump","If still no start, fuel pump may need inspection"]};
    if(t.includes("clicking")||t.includes("rapid click"))return{issue:"Dead or weak battery",sev:"high",spot:true,steps:["Jump-start the car to confirm","Test battery voltage (should be 12.6V+)","Check for corroded terminals","Replace battery if older than 3 years"]};
    if(t.includes("cranking")||t.includes("turns over"))return{issue:"Fuel or ignition system fault",sev:"med",steps:["Check fuel level and fuel pump pressure","Inspect spark plugs and ignition coils","Run OBD scan for fault codes"]};
    return null;
  },
  qs:[
    {q:"When you turn the key, does the engine crank (make a turning sound)?",opts:["Yes, cranks but won't start","No, nothing happens"]},
    {q:"Are the dashboard lights turning on?",opts:["Yes, lights are on","No, dashboard is dark"]},
    {q:"Do you hear any clicking sound?",opts:["Yes, rapid clicking","No sound at all"]},
    {q:"When was the battery last replaced?",opts:["Within a year","1-3 years ago","More than 3 years","Not sure"]}
  ],
  dx:function(a){
    if(a[0]==="No, nothing happens"&&a[1]==="No, dashboard is dark")return{issue:"Dead battery",sev:"high",spot:true,steps:["Jump-start the car to confirm","Test battery voltage (should be 12.6V+)","Replace battery if older than 3 years","Check alternator output after replacement"]};
    if(a[0]==="Yes, cranks but won't start")return{issue:"Fuel or ignition system fault",sev:"med",steps:["Check fuel level and fuel pump pressure","Inspect spark plugs and ignition coils","Check for fuel injector clog","Run OBD scan for fault codes"]};
    return{issue:"Starter motor issue",sev:"med",steps:["Test starter relay and solenoid","Check battery terminals for corrosion","Have starter motor inspected","Check wiring connections to starter"]};
  }
},

"battery":{icon:"🔋",title:"Battery Issue",qd:function(){return null;},
  qs:[
    {q:"How many days does the car sit unused before the battery dies?",opts:["1-2 days","3-5 days","A week or more"]},
    {q:"How old is the current battery?",opts:["Less than 1 year","1-3 years","More than 3 years"]},
    {q:"Any aftermarket accessories? (dashcam, extra lights, alarms)",opts:["Yes","No"]},
    {q:"Does the car start fine after a jump start?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[1]==="More than 3 years")return{issue:"Aged battery — needs replacement",sev:"high",spot:true,steps:["Replace battery (3+ years is past lifespan)","Check charging system after replacement","Test alternator output (13.5-14.5V running)","Inspect terminals for corrosion"]};
    if(a[2]==="Yes")return{issue:"Parasitic drain from accessories",sev:"med",steps:["Disconnect accessories overnight to test","Check dashcam/alarm power draw","Use a multimeter to find parasitic drain","Install battery cut-off switch if needed"]};
    return{issue:"Alternator or electrical leak",sev:"high",steps:["Test alternator output voltage","Check for parasitic current drain","Inspect fuses and relays","Have full electrical system tested"]};
  }
},

"battery replacement":{icon:"🔋",title:"Battery Replacement",
  qd:function(t){
    if(t.includes("need new battery")||t.includes("want new battery")||t.includes("replace battery")||t.includes("battery change")||t.includes("new battery"))
      return{issue:"Battery replacement — doorstep service available",sev:"high",spot:true,
        steps:["Our mechanic will come to your location with the right battery","Batteries available: Amaron, Exide, Luminous — all with warranty","Fitting + terminal cleaning included","Old battery disposal handled by us"]};
    return null;
  },
  qs:[
    {q:"What is your car make and model?",opts:["Maruti / Suzuki","Hyundai / Kia","Honda","Tata","Mahindra","Toyota","Other brand"]},
    {q:"What year is your car? (approximate)",opts:["2020 or newer","2015 – 2019","2010 – 2014","Before 2010"]},
    {q:"Is the car currently starting at all?",opts:["No, completely dead","Starts with jump / difficulty","Yes, just want to replace proactively"]}
  ],
  dx:function(a){
    var urgency=a[2]==="No, completely dead"?"high":"med";
    var urgText=a[2]==="No, completely dead"?"Emergency — battery completely dead":"Replacement recommended";
    return{issue:urgText+" ("+a[0]+" "+a[1]+")",sev:urgency,spot:true,
      steps:[
        "Battery brand options: Amaron (best for "+a[0]+"), Exide, or Luminous — all with 2-year warranty",
        a[2]==="No, completely dead"?"Emergency doorstep service available — mechanic comes to you within the hour":"Schedule a convenient time for doorstep battery replacement",
        "Mechanic will test your charging system (alternator) after fitting",
        "Old battery taken away for eco-disposal at no extra charge"
      ]};
  }
},

"engine overheating":{icon:"🌡️",title:"Engine Overheating",
  qd:function(t){
    if(t.includes("leak")||t.includes("leaking")||t.includes("dripping")||t.includes("puddle"))return{issue:"Coolant leak",sev:"high",steps:["Stop driving immediately — risk of engine damage","Check radiator hoses and clamps","Inspect water pump for leaks","Pressure test the cooling system"]};
    return null;
  },
  qs:[
    {q:"Is the temperature warning light on the dashboard lit up?",opts:["Yes","No, but temp gauge is high"]},
    {q:"Have you checked the coolant level recently?",opts:["Yes, it's fine","It was low","Haven't checked"]},
    {q:"Does it get worse when the AC is on?",opts:["Yes","No"]},
    {q:"Do you see any coolant leaking under the car?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[1]==="It was low"||a[3]==="Yes")return{issue:"Coolant leak",sev:"high",steps:["Stop driving immediately","Check radiator hoses and clamps","Inspect water pump for leaks","Pressure test the cooling system"]};
    if(a[2]==="Yes")return{issue:"Radiator fan or AC condenser issue",sev:"med",steps:["Check radiator fan operation with AC on","Clean radiator fins if clogged","Test fan motor and relay","Inspect AC condenser for blockage"]};
    return{issue:"Thermostat or radiator blockage",sev:"med",steps:["Test thermostat (may be stuck closed)","Flush and refill coolant system","Check radiator for internal blockage","Inspect water pump operation"]};
  }
},

"brake":{icon:"🛑",title:"Brake Issue",
  qd:function(t){
    if(t.includes("grind")||t.includes("scraping"))return{issue:"Brake pads completely worn — urgent",sev:"high",steps:["Do not drive until pads are replaced","Inspect rotors for scoring/damage","Replace pads and rotors if scored","Bleed brake fluid after service"]};
    if(t.includes("soft")||t.includes("spongy")||t.includes("sinking"))return{issue:"Brake fluid or master cylinder issue",sev:"high",steps:["Check brake fluid level immediately","Look for fluid leaks at all four wheels","Inspect master cylinder for failure","Bleed brakes if air in system"]};
    if(t.includes("squeak")||t.includes("squeal"))return{issue:"Brake pads need replacement",sev:"med",spot:true,steps:["Replace brake pads","Inspect rotors for minimum thickness","Clean caliper slide pins","Test after replacement"]};
    return null;
  },
  qs:[
    {q:"What kind of sound do you hear when braking?",opts:["Squeaking / squealing","Grinding / metal on metal","No noise, just weak brakes"]},
    {q:"How does the brake pedal feel?",opts:["Normal","Soft / goes to the floor","Hard / stiff"]},
    {q:"When was the last brake service?",opts:["Within a year","1-2 years ago","More than 2 years ago"]},
    {q:"Does the car pull to one side when braking?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[0]==="Grinding / metal on metal")return{issue:"Brake pads completely worn — urgent",sev:"high",steps:["Do not drive until pads are replaced","Inspect rotors for scoring/damage","Replace pads and rotors if scored","Bleed brake fluid after service"]};
    if(a[1]==="Soft / goes to the floor")return{issue:"Brake fluid or master cylinder issue",sev:"high",steps:["Check brake fluid level immediately","Look for fluid leaks at all four wheels","Inspect master cylinder for failure","Bleed brakes if air in system"]};
    if(a[0]==="Squeaking / squealing")return{issue:"Brake pads need replacement",sev:"med",spot:true,steps:["Replace brake pads","Inspect rotors for minimum thickness","Clean caliper slide pins","Test after replacement"]};
    return{issue:"Brake caliper or alignment issue",sev:"med",steps:["Check caliper on pulling side","Inspect brake hose for restriction","Check wheel alignment","Service both front calipers together"]};
  }
},

"ac not cooling":{icon:"❄️",title:"AC Not Cooling",
  qd:function(t){
    if(t.includes("noise")||t.includes("sound")||t.includes("grinding")||t.includes("clicking")||t.includes("rattl"))return{issue:"AC compressor issue",sev:"high",steps:["Stop using AC immediately to avoid further damage","Have the compressor clutch inspected by a mechanic","Check refrigerant pressure levels","Full AC system inspection recommended"]};
    if(t.includes("weak airflow")||t.includes("low airflow")||t.includes("no air"))return{issue:"Cabin air filter clogged",sev:"low",spot:true,steps:["Replace cabin air filter (often a DIY job)","Check blower motor operation","Inspect evaporator for ice buildup","Clean evaporator if musty smell present"]};
    return null;
  },
  qs:[
    {q:"How is the airflow from the vents?",opts:["Strong airflow, just not cold","Weak airflow","No airflow at all"]},
    {q:"Did the cooling stop suddenly or gradually?",opts:["Stopped suddenly","Gradually got worse"]},
    {q:"Any unusual noise when AC is turned on?",opts:["Yes, clicking or grinding","No noise"]},
    {q:"When was the last AC service?",opts:["Within a year","1-2 years ago","More than 2 years"]}
  ],
  dx:function(a){
    if(a[0]==="Weak airflow")return{issue:"Cabin air filter clogged",sev:"low",spot:true,steps:["Replace cabin air filter","Check blower motor operation","Inspect evaporator for ice buildup","Clean evaporator if musty smell"]};
    if(a[2]==="Yes, clicking or grinding")return{issue:"AC compressor issue",sev:"high",steps:["Stop using AC to avoid further damage","Have compressor clutch inspected","Check refrigerant pressure","Full AC system inspection recommended"]};
    if(a[0]==="Strong airflow, just not cold"&&a[1]==="Stopped suddenly")return{issue:"Refrigerant leak or compressor failure",sev:"high",steps:["Check refrigerant pressure","Look for oily residue near AC lines","Have system leak-tested","Recharge refrigerant after fixing leak"]};
    return{issue:"Low refrigerant / AC service overdue",sev:"med",spot:true,steps:["Get AC system recharged","Check for slow refrigerant leak","Inspect condenser for damage","Service AC system annually"]};
  }
},

"check engine":{icon:"⚠️",title:"Check Engine Light",qd:function(){return null;},
  qs:[
    {q:"Is the car driving and performing normally?",opts:["Yes, feels normal","No, something feels off"]},
    {q:"Any noticeable loss of power or rough running?",opts:["Yes","No"]},
    {q:"Has fuel consumption increased recently?",opts:["Yes, noticeably","No change"]},
    {q:"Do you have access to an OBD scanner?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[1]==="Yes")return{issue:"Serious engine/emission fault — scan needed",sev:"high",steps:["Read OBD fault codes immediately","Check for misfires (P030X codes)","Inspect spark plugs and coils","Do not ignore — can damage catalytic converter"]};
    if(a[2]==="Yes, noticeably")return{issue:"Fuel system or oxygen sensor issue",sev:"med",steps:["Scan OBD codes (look for O2 sensor codes)","Check mass airflow sensor","Inspect fuel injectors","Check for vacuum leaks"]};
    return{issue:"Minor sensor or emission fault",sev:"low",steps:["Scan with OBD reader for specific code","Check fuel cap is tight (common cause)","Monitor for other symptoms","Clear code and see if it returns"]};
  }
},

"car jerking":{icon:"⚡",title:"Car Jerking",qd:function(){return null;},
  qs:[
    {q:"When does the jerking happen?",opts:["During acceleration","At constant speed","Both"]},
    {q:"Is the fuel level low?",opts:["Yes, quite low","No, tank has fuel"]},
    {q:"When was the last full service done?",opts:["Within 6 months","6-12 months ago","More than a year ago"]},
    {q:"Any warning lights showing?",opts:["Yes","No"]}
  ],
  dx:function(a){
    if(a[0]==="During acceleration")return{issue:"Fuel delivery or ignition issue",sev:"med",steps:["Check spark plugs (replace if old)","Inspect fuel injectors","Check fuel pressure","Clean throttle body"]};
    if(a[0]==="At constant speed")return{issue:"Injector or sensor issue",sev:"med",steps:["Check MAF sensor and clean it","Inspect fuel injectors for clogging","Check TPS sensor","Scan OBD for misfire codes"]};
    return{issue:"Multiple causes likely — service overdue",sev:"med",steps:["Full OBD diagnostic scan","Replace spark plugs and air filter","Check fuel pump pressure","Inspect transmission mounts"]};
  }
},

"smoke":{icon:"💨",title:"Exhaust Smoke",
  qd:function(t){
    if(t.includes("white smoke"))return{issue:"Coolant burning — possible head gasket failure",sev:"high",steps:["Stop driving immediately","Check coolant level and look for milky oil on dipstick","Have a head gasket compression test done","Do not continue driving"]};

function normalizeMisspellings(s){

  var fixes=[
    // Puncture
    [/punc?h?tu?r?e?e?/g,"puncture"],[/puntuer/g,"puncture"],[/punture/g,"puncture"],

    [/cool[ae]nt/g,"coolant"],[/coolent/g,"coolant"],

    [/igni[ts][io]on/g,"ignition"],

    [/silen[sc]er/g,"silencer"],

function mapInput(t){
  var raw=t;
  t=" "+normalizeMisspellings(t.toLowerCase()).replace(/[^\w\s]/g," ")+" ";
  var h=function(w){return t.includes(" "+w+" ")||t.includes(" "+w+"s ")||t.endsWith(" "+w);};
  var c=function(w){return t.includes(w);};
  var a=function(){for(var i=0;i<arguments.length;i++)if(c(arguments[i]))return true;return false;};
  var both=function(w1,w2){return c(w1)&&c(w2);};

  // ── SMELL DIAGNOSIS ──────────────────────────────────────────────────
  if(a("burning rubber","burning tyre","burning tire","smell of rubber","smells like rubber",
       "burning wood","clutch smell","burning clutch","burning oil","oil smell",

       "sweet smell","smells sweet","sulphur","rotten egg","egg smell","mildew","musty smell",
       "musty","exhaust fumes inside","fumes inside","carbon monoxide","bad smell inside",
       "strange smell","weird smell","odour","odor","smell from car","battery water leakage and smell",
       "ac smells","ac bad smell","ac musty","ac stinks","vent smell","car smells like",
       "car stinks","car bad smell","leakage issue and smell"))return"smell diagnosis";

  // Self-start grinding: must catch before generic sound diagnosis
  if((c("grinding")&&c("not starting"))||(c("grinding")&&c("starting car"))||(c("grinding sound")&&c("start")))return"self start issue";

  // AC with noise → still AC issue, not generic sound diagnosis
  if((c(" ac ")||c("ac "))&&a("noise","sound","rattle","click","grind","bang","hiss","squeal","whistle","vibrat"))return"ac not cooling";

  // Natural language sound descriptions
  if(a("unusual sound","strange noise from","weird noise from car","car making sound",

       "clicking when braking","noise when turning","noise when braking",

var repairDB={
  "Dead battery":["Check battery voltage with a multimeter — should be 12.4V+ at rest","Connect jump-start cables: red(+) to dead battery, red(+) to good battery, black(-) to good battery, black(-) to bare metal on dead car","Start the working car and let run 3 minutes before starting the dead car","If it starts, drive for 20-30 minutes to recharge — do NOT turn off immediately","Test battery under load — voltage above 12.4V at rest can still fail under load","Replace battery if older than 3 years or if it fails load test"],
  "Coolant leak":["Allow engine to cool completely before opening anything — hot coolant under pressure causes serious burns","Visually inspect all radiator hoses (top, bottom) for cracks, soft spots, or wet patches","Check water pump for seeping coolant at the shaft","Inspect radiator for cracks or damage at the tanks (plastic ends)","Pressure test: connect a cooling system pressure tester to the expansion tank and pump to 1.2 bar — watch for drops","Top up coolant with correct type (50:50 premix or same colour as existing) — do NOT mix colours","Book professional repair — driving with a coolant leak risks engine seizure"],
  "Brake pads completely worn — urgent":["Do NOT drive until pads are replaced — metal-on-metal contact causes rotor damage and brake failure risk","Jack up the car safely on a flat surface with axle stands — never under a flimsy jack alone","Remove the wheel and inspect the caliper — the pad should have >3mm of material visible","Compress the caliper piston using a C-clamp and old pad before fitting new pads","Install new pads with the wear indicator on the inner pad facing the rotor","Bed in new pads: accelerate to 50km/h, apply firm (not emergency) brakes to slow to 10km/h — repeat 6-8 times","Warning: Do NOT open brake fluid reservoir cap when compressing caliper — fluid may overflow"],
  "Cabin air filter clogged":["Open glove box — remove contents and squeeze the sides to allow it to drop down past the stops","Filter housing is behind the glove box — unlatch the cover and pull the filter out","Hold filter up to light — if you cannot see light through it, replace it","Note the airflow direction arrow on new filter — must match the old one","Replacement takes 5-10 minutes — filter costs ₹200-₹800 depending on car","Replace every 15,000 km or 1 year in dusty Indian conditions"],
  "Low refrigerant / AC service overdue":["AC gas recharge requires a manifold gauge set and refrigerant — not a DIY job without equipment","A mechanic connects gauges to the high and low pressure ports on the AC lines","Correct refrigerant type: R134a (most cars before 2020) or R1234yf (newer cars)","After recharge, run AC at max cold and check if vents reach below 10°C","If gas runs out again quickly — there is a leak. Fix the leak before recharging again","Annual AC service prevents compressor seizure from oil starvation"],
  "Clutch plate worn out":["Clutch replacement requires removing the gearbox — it is a major job","Lift the car and support safely. Disconnect battery. Drain gearbox oil","Disconnect drive shafts, gear linkage, clutch cable/hydraulic line","Support engine with a jack through the sump. Remove gearbox mounting bolts and lower gearbox","Inspect flywheel surface for scoring or blue heat marks — resurface or replace if needed","Install clutch kit: pressure plate, new friction disc, new release bearing — align with centering tool","Reassemble in reverse. Bleed hydraulic clutch if hydraulic type","Professional job: allow 4-8 hours at a garage"],
  "Brake fluid or master cylinder issue":["Check brake fluid reservoir under the bonnet — level should be between MIN and MAX marks","If low: check for leaks at all four wheels (look for wet/rusty brake lines or pads)","Brake system bleed: attach clear hose to bleed nipple at each wheel caliper, pump pedal slowly, open nipple to expel air, close before pedal hits floor — repeat until no bubbles","Change fluid every 2 years regardless — it absorbs moisture and lowers boiling point","Master cylinder replacement: disconnect brake lines, unbolt from brake booster, install new one — needs full system bleed after","Warning: Never top up without finding the leak source — you'll run out again"],
  "Shock absorber or bush failure on that side":["Bounce test: push down firmly on that corner — if it bounces more than once, the shock is worn","Jack up the car and grab the tyre at 12 and 6 o'clock — check for play (worn strut mount)","Grab at 9 and 3 o'clock — play here indicates worn wheel bearing (different issue)","Shock replacement: remove wheel, unbolt bottom of shock from hub, remove top nuts from inside boot/bonnet","Always replace in pairs (both fronts or both rears) for even handling","After replacement: get 4-wheel alignment done — new suspension geometry may have shifted"],
  "Engine oil leak":["Clean the leaking area with brake cleaner and dry — makes source easier to identify","Run engine for 10 minutes and inspect — oil will seep from the actual source","Common sources: valve cover gasket (top of engine), sump plug (bottom), crankshaft oil seal (front/rear)","Valve cover gasket replacement: remove cover bolts, clean mating surfaces, apply new gasket or sealant, reinstall — relatively easy","Sump plug: drain oil, replace sealing washer, retighten to 25-30Nm — do not overtighten","Oil on exhaust pipe creates burning smell and fire risk — prioritise fixing"],
  "Tyre puncture — inspection needed":["For tubeless tyre (most modern cars): locate the puncture using soapy water sprayed on tyre","If nail/screw is in the tread (not sidewall): plug repair is possible — do not remove the object yet","Plug kit: ream the hole with the rasp tool, coat a plug strip with rubber cement, insert with eye of needle tool, cut flush","Tyre must be off the rim for a proper patch repair — plug is temporary for safe driving","Sidewall puncture: the tyre must be replaced — sidewall plugs are unsafe","After repair: inflate to correct PSI (usually 32-36 PSI) and recheck after 24 hours"],
  "Slow puncture or valve leak":["Remove valve cap and apply soapy water to the valve stem — bubbles confirm a leaking valve","Valve core replacement: use a valve core tool to unscrew the core, install new core, tighten firmly","If tyre itself is leaking: remove tyre and inspect inner surface for foreign objects","Check tyre bead on alloy rim — corrosion can cause air loss at the bead seal","Bead seal: remove tyre, clean rim with wire brush, apply bead sealant compound, remount"],
  "Clutch cable broken or hydraulic failure":["Cable clutch: locate cable at the clutch lever (manual) or under bonnet — check for snapping or fraying","Route the new cable the same way as the old one — no sharp bends","Adjust at the lever or on the cable barrel so pedal has 15-20mm free-play","Hydraulic clutch: check fluid reservoir near the pedal — top up with correct brake/clutch fluid (DOT 3 or 4)","Bleeding: attach hose to slave cylinder bleeder, pump pedal slowly, open bleeder to release air — close before pedal hits floor","If master/slave cylinder is leaking — it must be replaced. Seals cannot be repaired reliably"],
  "Wheel balance or alignment issue":["Wheel balancing: done on a balancing machine at any tyre shop — car does not need to be on road","Technician spins each wheel and attaches small lead weights to correct imbalance — takes 15-20 mins","Wheel alignment: car is driven onto an alignment rack with sensors on each wheel","Technician adjusts toe, camber, and caster angles to manufacturer spec — takes 30-45 mins","DIY alignment check: drive straight, let go of steering wheel briefly — car should track straight","Rotate tyres every 10,000 km to ensure even wear — prevents premature alignment issues"],
  "Radiator fan or AC condenser issue":["Test fan: turn on AC or let engine reach operating temp — fan should run","Access fan fuse in fuse box and test with a multimeter or swap with identical-rated spare","Test fan motor directly: disconnect harness, apply 12V from battery — if fan spins, relay/fuse is the fault; if not, motor is dead","Relay replacement: find relay in fuse box (refer to manual), pull and replace with identical unit","Fan motor replacement: disconnect harness, remove mounting bolts, install new motor — 30-45 mins"],
  "ABS module or wheel speed sensor fault":["Scan with OBD reader for C-series codes — identifies which wheel sensor has failed","Wheel speed sensor location: on the hub, behind the brake disc — one per wheel","Sensor replacement: remove wheel, unbolt sensor (1-2 bolts), disconnect harness, install new sensor","Clean tone ring (reluctor ring on CV joint/hub) with wire brush — dirty tone ring causes false readings","After replacement: clear OBD codes and road test — ABS light should go out if sensor was the fault","If light returns after sensor replacement: ABS control module may need replacement or reprogramming"],
  "Spark plug, coil, or injector fault":["Scan for P030X codes — X identifies the misfiring cylinder (P0301=cylinder 1, P0302=2, etc.)","Swap the ignition coil from the misfiring cylinder with a known-good one — if misfire moves, the coil is faulty","Remove and inspect spark plug from that cylinder — look for cracks, heavy deposits, incorrect gap","Spark plug gap: 0.7-1.0mm typically — check your car's specification","Swap injector with adjacent cylinder if misfire persists after coil and plug — if misfire moves, injector is faulty","Injector cleaning with fuel system cleaner (added to fuel tank) sometimes resolves partial blockages"],
  "Engine oil burning — piston rings / valve seals":["Check oil level weekly — note how much you are adding per 1000 km","Valve stem seal replacement (cheaper): seals can be replaced with head on engine using compressed air to hold valves — specialist job","Piston ring replacement requires full engine disassembly — very expensive, often not worth it on older cars","Compression test: remove all spark plugs, connect compression tester, crank 5 times — all cylinders should be within 10% of each other","Leak-down test confirms where compression is lost: 10% or less = good, over 20% = rings or valve seats","Consider engine oil with higher viscosity temporarily to reduce consumption while planning major repair"],
  "EV battery depleted — flatbed tow to charging station":["Do NOT attempt to jump-start an EV — this will cause serious damage to the high-voltage system","Call for a flatbed tow truck — not an underlift — EV drivetrains must not rotate when unpowered","At the charging station: connect to DC fast charger (CCS or CHAdeMO depending on your EV)","Allow to charge to at least 20% before attempting to drive","Avoid running battery below 10% regularly — it accelerates long-term battery degradation","If this is a recurring issue: check battery health at EV workshop — degraded cells cause sudden shutoff"],
  // Clutch variant repair keys
  "Clutch plate worn or severely slipping":["Do NOT do hard acceleration or hill starts — it worsens the wear rapidly","Clutch replacement requires removing the gearbox — it is a 4-8 hour professional job","Full clutch kit recommended: new friction disc + pressure plate + release bearing","Inspect flywheel face for scoring or blue heat damage — resurface or replace if needed","After replacement: bed in the new clutch by avoiding heavy load for 500km","Cost in Delhi NCR: ₹4,000–₹18,000 depending on car model and clutch kit quality"],
  "Severe clutch slip — plate overheating":["Stop driving immediately — further driving accelerates damage and risks complete failure","Full clutch kit replacement is the only fix at this stage","Flywheel inspection is essential — heat damage may mean flywheel also needs replacement","Do not drive until repaired — if gears cannot be engaged, call for towing"],
  "Clutch cable tight or hydraulic issue":["Cable clutch: locate cable at the clutch lever, check for kinks, fraying or incorrect routing","Adjust cable tension: loosen locknut, turn adjuster until pedal has 15-20mm free-play","Hydraulic clutch: check fluid level in reservoir near pedal — top up with DOT 3 or 4 brake fluid","Bleeding the hydraulic clutch: attach clear hose to slave cylinder bleeder, pump pedal, open bleeder to expel air","If cable or hose is cracked — replace it. Adjustment alone will not fix a failing cable"],
  "Release bearing or pivot worn":["Release bearing sits between the clutch fork and pressure plate — it spins when pedal is pressed","Replacement requires gearbox removal — replace bearing while the gearbox is out (cheap part, expensive access)","If catching it early: avoid riding the clutch pedal — it reduces bearing life","Combined replacement with clutch kit is the most economical approach"],
  "Power steering pump failing":["Check PS fluid level first — low fluid causes whining and wear","Run engine and turn wheel lock to lock — this circulates fluid and removes air bubbles","PS pump pressure test: connect gauge to high-pressure port — should be 80-100 bar at idle","If pressure is low — pump is worn, replacement needed","PS pump replacement: remove accessory belt, unbolt pump from bracket, disconnect hoses, install new pump, refill and bleed system"],
  "Warped brake discs":["Brake disc resurfacing (skimming): disc is machined flat on a lathe — only possible if above minimum thickness","Minimum thickness is stamped on the disc hub — do not machine below this","Disc replacement: jack car, remove wheel, remove caliper (hang from spring with wire — do not stress brake line), remove disc retaining screw, pull disc off hub","Install new disc, clean with brake cleaner, refit caliper with new pads","Bed in: 5-6 firm stops from 50km/h to 10km/h — do not stop completely during bed-in"],
  "Seized brake caliper":["Test: compare wheel temperatures after 10 min drive — hotter wheel = seized caliper","Caliper piston: try pressing piston back in with C-clamp — if it will not move, it is seized","Caliper slide pins: remove pins, clean with brake cleaner, apply silicone grease — stiff slides cause dragging","Full caliper rebuild kit available for most cars — replace seals and pistons","If piston is corroded or cracked — full caliper replacement is safer than rebuild","Always replace calipers in pairs (both fronts or both rears) for balanced braking"],
  "Wheel bearing failure":["Jack up the car safely and grab the tyre at 12 and 6 o clock — rocking indicates bearing play","Spin the wheel by hand — rough grinding feeling confirms worn bearing","Wheel bearing replacement: remove wheel, brake disc, caliper — hub nut (central large nut) must be removed","Hub nut is very tight (200-350Nm) — requires an impact wrench or breaker bar","Press or knock out old bearing from hub — install new bearing with correct tool (do not hammer directly on bearing)","After replacement: get alignment checked — removing the hub can alter toe angle"],
  "Alternator failure":["Test alternator output: connect multimeter across battery, run engine at 2000 RPM — should read 13.5-14.5V","If below 13V — alternator is not charging properly","Alternator replacement: remove accessory belt, disconnect electrical connectors, unbolt alternator from bracket","Check belt tensioner and condition before fitting new alternator — a new alternator wasted on a snapped belt","After fitting: run engine and check voltage is back to 13.5-14.5V at 2000 RPM","If voltage is correct but battery stays flat — check for parasitic drain"],

  "Starter motor issue":["Check battery voltage first — a weak battery mimics a dead starter (should be 12.4V+)","Listen carefully: silence = starter not getting power; single clunk = solenoid engaging but motor seized; grinding = ring gear damaged","Test starter relay: locate relay in fuse box, swap with identical spare — if car starts, relay was faulty","Tap the starter motor body firmly with a hammer while someone turns the key — this sometimes frees a seized motor temporarily","Starter motor replacement: disconnect battery, locate starter (usually beside gearbox), disconnect wiring, unbolt and remove","Install new starter, reconnect wiring (red wire to B+ terminal, smaller wire to solenoid S terminal)","Torque starter bolts to 40-50Nm — loose starter causes grinding on ring gear"],

  "Fuel or ignition system fault":["Check fuel level first — an empty tank is the most common overlooked cause","Fuel pump test: turn key to ON (not START) — you should hear a brief whirring from the fuel tank (pump priming)","No pump sound = fuel pump may have failed. Check fuse first (fuel pump fuse in fuse box)","Spark test: remove a spark plug lead, insert spare plug, hold against bare metal, crank engine — should see blue spark","No spark = check ignition coil, distributor cap (older cars), or crankshaft position sensor","OBD scan for fault codes — P0300-P0312 = misfire, P0230-P0233 = fuel pump circuit, P0335 = crankshaft sensor"],

function _dbLookup(db, issue){
  var il=issue.toLowerCase();
  // 1. Exact match
  if(db[issue])return db[issue];
  // 2. Key is substring of issue or vice versa
  var keys=Object.keys(db);
  for(var i=0;i<keys.length;i++){
    var kl=keys[i].toLowerCase();
    if(il.includes(kl)||kl.includes(il))return db[keys[i]];
  }
  // 3. Keyword overlap scoring — find best match
  var iWords=il.replace(/[^a-z\s]/g,' ').split(/\s+/).filter(function(w){return w.length>3;});
  var best=null,bestScore=0;
  for(var i=0;i<keys.length;i++){
    var kWords=keys[i].toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(function(w){return w.length>3;});
    var score=0;
    iWords.forEach(function(w){if(kWords.indexOf(w)>=0)score++;});
    if(score>bestScore){bestScore=score;best=db[keys[i]];}
  }
  return bestScore>=2?best:null;
}

function getRepair(issue){return _dbLookup(repairDB,issue);}
function getSymptoms(issue){return _dbLookup(diagDB,issue);}

function checkCarQA(text){
  var t = ' '+text.toLowerCase().replace(/[^\w\s]/g,' ')+' ';
  for(var i=0;i<carQA.length;i++){
    var qa=carQA[i];
    for(var j=0;j<qa.keys.length;j++){
      if(t.includes(qa.keys[j]))return qa.answer;
    }
  }
  return null;
}

function isPriceQuery(text){
  var t=text.toLowerCase();
  return t.includes("how much")||t.includes("kitna")||t.includes(" cost")||t.includes("costs")||
    t.includes("price")||t.includes("pricing")||t.includes("charge")||t.includes("charges")||
    t.includes("fees")||t.includes(" fee ")||t.includes("rate")||t.includes("rates")||
    t.includes("what will it")||t.includes("how expensive")||t.includes("affordable")||
    t.includes("budget")||t.includes("cheap")||t.includes("expensive");
}

function isGreeting(text){
  var t=text.toLowerCase().trim().replace(/[^a-z\s]/g,"");
  var greetings=["hi","hello","hey","hii","hiii","helo","helo","helllo","hola",
    "namaste","namaskar","good morning","good afternoon","good evening","good night",
    "sup","what's up","whats up","yo","howdy","greetings","hi there","hello there",
    "hey there","hi buddy","hello buddy","start","ok","okay","begin","test",
    "hy","hye","hai","haii","hullo","help","need help","i need help","can you help",
    "who are you","are you there","anyone there","hello anyone"];
  for(var i=0;i<greetings.length;i++){
    if(t===greetings[i]||t.startsWith(greetings[i]+" ")||t===greetings[i].replace("'",""))return true;
  }
  // Very short inputs with no car-related words are likely greetings
  if(t.split(" ").length<=2&&!mapInput(text))return true;
  return false;
}

function processInput(text){
  // Greeting handler — respond warmly, ask for car issue
  if(isGreeting(text)&&st.phase==="idle"&&!st.key){
    addMsg(text,"user");
    showTyping();
    setTimeout(function(){
      rmTyping();
      addMsg("Hello! &#128075; I am <strong>CarBuddy</strong> — your AI car diagnosis assistant.<br><br>Tell me what problem you are facing with your car and I will help diagnose it right away!","bot");
    },500);
    return;
  }

  // Price queries are always handled as follow-ups regardless of phase
  if(isPriceQuery(text)){if(handleFollowUp(text))return;}
  // Handle car model collection phase
  if(st.phase==="awaiting_model"||st.phase==="awaiting_model_text"){
    // Accept whatever the user types as car model — normalise capitalisation nicely
    var modelRaw=text.trim();
    var modelClean=modelRaw.charAt(0).toUpperCase()+modelRaw.slice(1).toLowerCase();
    // Fix common brand name capitalisations
    var brands={"maruti":"Maruti","suzuki":"Suzuki","hyundai":"Hyundai","kia":"Kia",
      "honda":"Honda","tata":"Tata","mahindra":"Mahindra","toyota":"Toyota",
      "volkswagen":"Volkswagen","vw":"VW","skoda":"Skoda","ford":"Ford",
      "renault":"Renault","nissan":"Nissan","mg":"MG","jeep":"Jeep",
      "bmw":"BMW","mercedes":"Mercedes","audi":"Audi","volvo":"Volvo",
      "isuzu":"Isuzu","mitsubishi":"Mitsubishi","fiat":"Fiat","datsun":"Datsun"};
    var words=modelRaw.toLowerCase().split(" ");
    for(var wi=0;wi<words.length;wi++){
      if(brands[words[wi]])words[wi]=brands[words[wi]];
      else words[wi]=words[wi].charAt(0).toUpperCase()+words[wi].slice(1);
    }
    modelClean=words.join(" ");
    // If user selected a brand first, prepend it (avoid duplication)
    if(st.pendingBrand){
      var brand=st.pendingBrand.split(" /")[0].trim(); // "Maruti / Suzuki" → "Maruti"
      var lc=modelClean.toLowerCase();
      var lbrand=brand.toLowerCase();
      if(!lc.startsWith(lbrand))modelClean=brand+" "+modelClean;
      st.pendingBrand=null;
    }
    st.carModel=modelClean;
    addMsg(modelClean,"user");
    var saved=st.pendingText;
    st.phase="idle";
    setTimeout(function(){
      addMsg("Thanks! Diagnosing your <strong>"+modelClean+"</strong>...","bot");
      setTimeout(function(){processInput(saved);},500);
    },300);
    return;
  }
  if(st.phase==="done"){if(handleFollowUp(text))return;}
  var key=mapInput(text);
  if(!key){
    showTyping();
    setTimeout(function(){
      rmTyping();
      var qaAnswer = checkCarQA(text);
      if(qaAnswer){
        addMsg(qaAnswer,'bot');
        setTimeout(addRestart,400);
      } else {
        addMsg("I don't have a specific diagnosis for that — but our mechanics will know exactly what to do!<br><br>"+
          "&#128222; Call <strong><a href='tel:8393990942' style='color:var(--p);text-decoration:none;'>8393990942</a></strong> for a full explanation and to book a mechanic at your doorstep.","bot");
      }
    },700);
    return;
  }
  // Ask for car model before starting diagnosis (only if not already collected)
  if(!st.carModel){
    st.pendingText=text;
    st.key=key;
    st.phase="awaiting_model";
    showTyping();
    setTimeout(function(){
      rmTyping();
      addMsg("Got it! Before I diagnose — <strong>what is your car make and model?</strong> (e.g. Maruti Swift, Hyundai Creta, Honda City)","bot");
      showOpts(["Maruti / Suzuki","Hyundai / Kia","Honda","Tata","Mahindra","Toyota","Other brand"]);
    },500);
    return;
  }

  st.key=key;st.tree=trees[key];st.qi=0;st.ans=[];st.phase="questioning";
  var early=trees[key].qd?trees[key].qd(text.toLowerCase()):null;
  showTyping();
  setTimeout(function(){
    rmTyping();
    if(early){
      addMsg("Got it — based on what you described, I can already identify the issue.","bot");
      setTimeout(function(){
        renderCard(st.tree,early);
        setTimeout(function(){
          addMsg("Does this match your issue? If you want a more detailed walkthrough, just say <strong>ask me questions</strong>.","bot");
          setTimeout(addRestart,200);
        },200);
      },150);
      st.phase="done";
    }else{
      var q=st.tree.qs[0];
      addMsg("<strong>"+q.q+"</strong>","bot");
      setTimeout(function(){showOpts(q.qs||q.opts);},80);
    }
  },600);
}

function sendMsg(){
  var inp=document.getElementById("inp"),val=inp.value.trim();
  if(!val)return;inp.value="";addMsg(val,"user");processInput(val);
}

function resetAll(){
  document.getElementById("chat").innerHTML="";
  var savedModel=st.carModel;  // keep model across diagnoses in same session
  st={phase:"idle",key:null,tree:null,qi:0,ans:[],carModel:savedModel,pendingText:null,pendingBrand:null};
  var greeting=savedModel
    ? "What else can I help you diagnose for your <strong>"+savedModel+"</strong>? Describe the issue below."
    : "What else can I help you diagnose? Describe your car issue below.";
  setTimeout(function(){addMsg(greeting,"bot");},150);
}

document.getElementById("sbtn").addEventListener("click",sendMsg);
document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter")sendMsg();});

setTimeout(function(){addMsg("Hi! I am <strong>CarBuddy</strong> — your AI car diagnosis assistant covering <strong>all car problems</strong>. Describe your issue or tell me about any unusual <strong>noise</strong>, <strong>smell</strong>, <strong>smoke</strong>, or <strong>feeling</strong> from your car.","bot");},300);
</script>
