*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
body{font-family:'DM Sans','Helvetica Neue',sans-serif;background:#f8fafc;color:#0f172a;}
.seg-btn{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.seg-btn:hover{border-color:#94a3b8;background:#f8fafc}
.seg-btn.active{border-color:#3b82f6;background:#eff6ff}
.sym-btn{background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:flex-start;gap:9px;width:100%}
.sym-btn:hover{border-color:#94a3b8;background:#f8fafc}
.sym-btn.active{border-color:#6366f1;background:#eef2ff}
.tab-btn{background:none;border:none;padding:9px 14px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;border-bottom:2px solid transparent;color:#94a3b8;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tab-btn:hover{color:#475569}
.tab-btn.active{color:#4f46e5;border-bottom-color:#4f46e5}
.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.05em;font-family:'JetBrains Mono',monospace}
.bi-row{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.fraud-row{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.check-icon{width:22px;height:22px;border-radius:6px;background:#eef2ff;border:1.5px solid #c7d2fe;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mono{font-family:'JetBrains Mono',monospace}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.price-row:last-of-type{border-bottom:none}
.agent-box{background:#fafafa;border:1.5px solid #e2e8f0;border-radius:12px;padding:18px;font-size:14px;line-height:2;color:#1e293b;border-left:4px solid #6366f1}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .18s ease-out}
.sd-yes{color:#16a34a;font-weight:700}
.sd-maybe{color:#d97706;font-weight:700}
.sd-no{color:#dc2626;font-weight:700}
.reset-btn{background:#fff;border:1.5px solid #e2e8f0;border-radius:7px;padding:5px 13px;color:#64748b;font-size:12px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:#94a3b8;color:#334155}
.total-card{background:linear-gradient(135deg,#eef2ff 0%,#f0f9ff 100%);border:1.5px solid #c7d2fe;border-radius:12px;padding:16px}
.pill-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.fly-warn{background:#fffbeb;border:1.5px solid #fde68a;border-radius:8px;padding:9px 12px;font-size:12px;color:#92400e;margin-top:10px}
.master-rule{background:#fef2f2;border:1.5px solid #fecaca;border-radius:10px;padding:12px 14px;font-size:12.5px;color:#991b1b;line-height:1.6;margin-top:14px}
.pre-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 14px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:48px;text-align:center}
.hi-text{color:#7c3aed;font-size:12px;margin-top:3px;line-height:1.4}
.en-text{font-size:13px;font-weight:600;color:#0f172a}
.detail-en{font-size:12.5px;color:#374151;line-height:1.6}
.detail-hi{font-size:12px;color:#7c3aed;line-height:1.5;margin-top:4px;font-style:italic}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:#94a3b8;font-family:'JetBrains Mono',monospace;text-transform:uppercase;margin-bottom:10px}
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 49px)}
.sidebar{border-right:1.5px solid #e2e8f0;padding:18px 14px;overflow-y:auto;background:#f8fafc}
.main-panel{overflow-y:auto;background:#f8fafc}
.result-header{padding:20px 24px 0;border-bottom:1.5px solid #e2e8f0;background:#fff}
.tab-bar{display:flex;gap:0;margin-top:4px;overflow-x:auto}
.tab-content{padding:20px 24px}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pricing-right{display:flex;flex-direction:column;gap:12px}
.status-pills{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.header-inner{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.agent-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.upsell-pills{display:flex;flex-wrap:wrap;gap:8px}
</style>
