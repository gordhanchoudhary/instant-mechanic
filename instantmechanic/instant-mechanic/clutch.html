                      <div className="total-card">
                        <div style={{fontSize:10,fontWeight:700,letterSpacing:".1em",color:"#818cf8",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>ALL-IN ESTIMATE — IM RATE</div>
                        <div style={{fontSize:11,color:"#7c3aed",fontStyle:"italic",marginBottom:8}}>Parts + labour sab milake</div>
                        <div style={{fontSize:34,fontWeight:800,color:"#4f46e5",fontFamily:"'JetBrains Mono',monospace"}}>{tot||"—"}</div>
                        {fly&&<div style={{fontSize:12,color:"#d97706",marginTop:6,fontWeight:500}}>{fly} agar flywheel polish/replace hogi</div>}
                      </div>
                      {R.flywheel_risk&&(
                        <div className="card">
                          <div className="section-label">Flywheel — Agar Zarurat Padi</div>
                          <div className="price-row">
                            <div>
                              <div style={{fontSize:13,color:"#374151"}}>Resurface (Machine shop polish)</div>
                              <div style={{fontSize:11,color:"#7c3aed",fontStyle:"italic"}}>Machine se ghisaai saaf karna</div>
                            </div>
                            <span style={{color:"#16a34a",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,flexShrink:0}}>{P.flywheel_resurface}</span>
                          </div>
                          <div className="price-row">
                            <div>
                              <div style={{fontSize:13,color:"#374151"}}>Replace — naya flywheel</div>
                              <div style={{fontSize:11,color:"#7c3aed",fontStyle:"italic"}}>Naya lagana — sirf crack ho tabhi</div>
                            </div>
                            <span style={{color:"#dc2626",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,flexShrink:0}}>{P.flywheel_replace}</span>
                          </div>
                          <div style={{marginTop:8,fontSize:11.5,color:"#64748b",lineHeight:1.5}}>Pehle polish karo. Replace tabhi jab crack ho photo mein.</div>
                        </div>
                      )}
                      <div className="card">
                        <div className="section-label">Agent Quote Rule / Kaise bolein</div>
                        <div style={{fontSize:12.5,color:"#374151",lineHeight:1.6}}>Kit jobs pe ek exact number mat bolo. Kaho: <span style={{color:"#4f46e5",fontWeight:600}}>"Parts + labour milake approx ₹X–Y — flywheel theek nikli toh lower end pe rahega, aapko confirm karenge."</span></div>
                      </div>
                    </div>
                  </div>
                )}

                {tab==="upsell"&&(
                  <div className="fade-in">
                    <div style={{fontSize:12.5,color:"#64748b",marginBottom:16,lineHeight:1.6,padding:"10px 14px",background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:8}}>
                      Inn upsells ke baare mein cx ko <strong style={{color:"#0f172a"}}>drop-off se PEHLE</strong> batao — gaadi kholne ke baad cx ke paas bargain ka mauka nahi rehta.
                    </div>
                    {R.upsells.map((u,i)=>(
                      <div key={i} className="bi-row">
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <span className="badge" style={{background:RB[u.risk],color:RC[u.risk],border:`1.5px solid ${RD[u.risk]}`}}>{u.risk} RISK</span>
                          <div>
                            <div className="en-text">{u.item}</div>
                            <div className="hi-text">{u.itemHi}</div>
                          </div>
                        </div>
                        <div className="detail-en">{u.detail}</div>
                        <div className="detail-hi">{u.detailHi}</div>
                      </div>
                    ))}
                  </div>
                )}

                {tab==="fraud"&&(
                  <div className="fade-in">
                    <div style={{fontSize:12.5,color:"#64748b",marginBottom:16,lineHeight:1.6,padding:"10px 14px",background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:8}}>
                      Garage payment release karne se pehle <strong style={{color:"#0f172a"}}>har check complete karo</strong>. Ek bhi miss nahi hona chahiye.
                    </div>
                    {R.fraud.map((f,i)=>(
                      <div key={i} className="fraud-row">
                        <div className="check-icon">
                          <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" fill="none" stroke="#6366f1" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </div>
                        <div style={{flex:1}}>
                          <div className="en-text" style={{marginBottom:2}}>{f.check}</div>
                          <div className="hi-text" style={{marginBottom:6}}>{f.checkHi}</div>
                          <div className="detail-en">{f.detail}</div>
                          <div className="detail-hi">{f.detailHi}</div>
                        </div>
                      </div>
                    ))}
                    <div className="master-rule">
                      <strong>Master Rule / Sabse zaroori baat:</strong> Jitne parts ka bill aaya, utne purane parts bag mein wapas aane chahiye cx ko. Purana part nahi aaya = part badla nahi = bill se hatao.
                    </div>
                  </div>
                )}

                {tab==="agent"&&(
                  <div className="fade-in">
                    <div className="section-label" style={{marginBottom:10}}>Suggested Opening Line — CX se kaise shuru karo</div>
                    <div className="agent-box">{R.agent_line}</div>
                    <div className="agent-grid">
                      <div className="pre-card">
                        <div className="section-label">Drop-off se pehle CX ko zaroor batao</div>
                        <div style={{fontSize:12.5,color:"#374151",lineHeight:2}}>
                          ✓ Approximate cost range batao<br/>
                          ✓ Time + aaj hoga ya kal — confirm<br/>
                          ✓ Flywheel extra lag sakti hai — warn karo<br/>
                          ✓ Koi bhi extra kaam hoga toh pehle call<br/>
                          ✓ Purane parts bag mein wapas milenge<br/>
                          ✓ Part ka box kholne se pehle dikhayenge
                        </div>
                      </div>
                      <div className="pre-card">
                        <div className="section-label">Garage ne add-on recommend kiya toh</div>
                        <div style={{fontSize:12.5,color:"#374151",lineHeight:2}}>
                          "Sir garage bol rahe hain [item] bhi chahiye — ₹X extra. Photo / reason aaya hai. Aapko proceed karna hai?"<br/>
                          <span style={{color:"#dc2626",fontWeight:600}}>Kabhi bhi khud approve mat karo. CX ka WhatsApp confirmation pehle, kaam baad mein.</span>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
