<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Instant Mechanic Investor Deck</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}
body{
    background:#f5f7fb;
}
.header{
    background:white;
    border-bottom:1px solid #e5e7eb;
    padding:18px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{
    font-size:24px;
    font-weight:700;
}
.sub{
    color:#666;
    font-size:14px;
}
.actions{
    display:flex;
    gap:10px;
}
.btn{
    background:#111827;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
}
.btn:hover{
    opacity:.9;
}
.viewer{
    width:100%;
    height:calc(100vh - 64px);
}
.viewer iframe{
    width:100%;
    height:100%;
    border:none;
}
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}
.modal-card{
    background:white;
    width:500px;
    max-width:95%;
    border-radius:16px;
    padding:25px;
}
.modal-card h2{
    margin-bottom:8px;
}
.modal-card p{
    color:#666;
    margin-bottom:20px;
}
.option{
    border:1px solid #ddd;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}
.option:hover{
    background:#f8fafc;
}
#otherEmail{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:10px;
}
.hidden{
    display:none;
}
</style>

<!--
  Mixpanel JS SDK — latest (v2.76+) loaded via CDN snippet.
  record_sessions_percent is intentionally set to 0 here.
  We call mixpanel.start_session_recording() manually AFTER
  the investor identifies themselves, so the replay is tied
  to a known identity from frame 1.
-->
<script type="text/javascript">

mixpanel.init("afeb927e0d7ee7ddfa033985ab2fe603", {
    debug: false,

    // Session Replay — disabled at init, started manually post-identity
    record_sessions_percent: 0,

    // Once we start, record everything useful
    record_console:      true,   // capture JS console logs/errors in replay
    record_heatmap_data: true,   // rage clicks, dead clicks, heatmap data
    record_network:      true,   // capture API calls timeline in replay
    record_network_options: {
        initiatorTypes: ["fetch", "xmlhttprequest"],
        recordInitialRequests: true
    },

    // Privacy — mask everything by default (this is an investor page, not a public app)
    record_mask_all_text:   false,   // we WANT to see what they're reading
    record_mask_all_inputs: true,    // mask any inputs that appear

    record_idle_timeout_ms: 900000,  // end replay after 15min idle
    record_min_ms:          5000     // discard accidental sub-5s replays
});
</script>

</head>
<body>

<div id="investorModal" class="modal">
    <div class="modal-card">
        <h2 id="welcomeTitle">Welcome</h2>
        <p>Please identify yourself before viewing the deck.</p>
        <div id="investorOptions"></div>
        <div id="otherContainer" class="hidden">
            <input id="otherEmail" placeholder="Enter your email">
            <button class="btn" style="margin-top:10px;width:100%;" onclick="continueOther()">Continue</button>
        </div>
    </div>
</div>

<div class="header">
    <div>
        <div class="logo">Instant Mechanic</div>
        <div class="sub" id="vcNameDisplay">Investor Deck</div>
    </div>
    <div class="actions">
        <a class="btn" id="downloadBtn" target="_blank">Download Deck</a>
        <button class="btn" onclick="openFullscreen()">Fullscreen</button>
    </div>
</div>

<div class="viewer" id="viewerContainer">
    <iframe id="pdfViewer"></iframe>
</div>

<script>

const PDF_URL = "https://customers-car-image.s3.ap-south-1.amazonaws.com/car-images/78adbc25-0d15-4e1f-9d8a-af4b083c7a66.pdf";

const investors = {
    "accel":       { emails: ["mahendran@accel.com","nnandan@accel.com"] },
    "100x.vc":     { emails: ["sanjay@100x.vc","vatsal@100x.vc"] },
    "antler":      { emails: ["rajiv@antler.co","bhavna.suresh@antler.co"] },
    "peakxv":      { emails: ["amohan@peakxv.com","rajan@peakxv.com"] },
    "blume":       { emails: ["arpit@blume.vc","karthik@blume.vc"] },
    "kae-capital": { emails: ["nisha@kae-capital.com","sunitha@kae-capital.com"] },
    "z47":         { emails: ["rajat@z47.com","tarun@z47.com"] },
    "kalaari":     { emails: ["jayraj@kalaari.com","vamshi@kalaari.com"] }
};

const params        = new URLSearchParams(window.location.search);
const vc            = (params.get("vc") || "").toLowerCase();
const sessionStart  = Date.now();
let   selectedEmail = "";

// Engagement state
let focusStart        = Date.now();
let totalFocusSeconds = 0;
let isFocused         = !document.hidden;
let maxScrollPct      = 0;
let scrollMilestones  = {};
let idleTimer;
const IDLE_THRESHOLD  = 30;

document.getElementById("downloadBtn").href = PDF_URL;
const data = investors[vc];
document.getElementById("vcNameDisplay").innerText = vc ? vc.toUpperCase() + " Team" : "Investor Deck";
document.getElementById("welcomeTitle").innerText  = vc ? `Welcome ${vc.toUpperCase()} Team` : "Welcome";

// Build identity options
const optionsContainer = document.getElementById("investorOptions");
if (data) {
    data.emails.forEach(email => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = email;
        div.onclick = () => startViewing(email);
        optionsContainer.appendChild(div);
    });
}
const otherDiv = document.createElement("div");
otherDiv.className = "option";
otherDiv.innerText = "Other";
otherDiv.onclick = () => document.getElementById("otherContainer").classList.remove("hidden");
optionsContainer.appendChild(otherDiv);

function continueOther() {
    const email = document.getElementById("otherEmail").value.trim();
    if (!email) { alert("Please enter your email"); return; }
    startViewing(email);
}

// ─── Core: identify → start replay → open deck ────────────────────────────────
function startViewing(email) {
    selectedEmail = email;

    // 1. Identify the user BEFORE starting replay so the recording is attributed
    mixpanel.identify(email);
    mixpanel.people.set({
        "$email":    email,
        "vc":        vc,
        "first_seen": new Date().toISOString()
    });

    // 2. Start Session Replay — now every click/scroll/hover is captured
    mixpanel.start_session_recording();

    // 3. Show the deck
    document.getElementById("investorModal").style.display = "none";
    document.getElementById("pdfViewer").src = PDF_URL;

    // 4. Track the open event (this gets the $mp_replay_id attached automatically)
    track("Deck Opened", {
        referrer:     document.referrer || "direct",
        utm_source:   params.get("utm_source")  || null,
        utm_medium:   params.get("utm_medium")  || null,
        utm_campaign: params.get("utm_campaign")|| null,
        device_type:  /Mobi|Android/i.test(navigator.userAgent) ? "mobile" : "desktop",
        screen_res:   `${screen.width}x${screen.height}`,
        timezone:     Intl.DateTimeFormat().resolvedOptions().timeZone,
        replay_url:   mixpanel.get_session_replay_url() || null
    });

    startEngagementTracking();
    startIdleDetection();
    startHeartbeat();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function track(event, props = {}) {
    mixpanel.track(event, Object.assign({ email: selectedEmail, vc: vc }, props));
}

function secondsInSession() {
    return Math.round((Date.now() - sessionStart) / 1000);
}

function currentFocusSeconds() {
    return totalFocusSeconds + (isFocused ? Math.round((Date.now() - focusStart) / 1000) : 0);
}

// ─── Focus / attention time + visibility ─────────────────────────────────────
function startEngagementTracking() {
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            if (isFocused) {
                totalFocusSeconds += Math.round((Date.now() - focusStart) / 1000);
                isFocused = false;
            }
            mixpanel.pause_session_recording();
            track("Tab Hidden", {
                time_in_session_s: secondsInSession(),
                total_focus_s:     totalFocusSeconds
            });
        } else {
            focusStart = Date.now();
            isFocused  = true;
            mixpanel.resume_session_recording();
            track("Tab Visible", { time_in_session_s: secondsInSession() });
        }
    });

    window.addEventListener("focus", () => {
        if (!isFocused) { focusStart = Date.now(); isFocused = true; }
    });
    window.addEventListener("blur", () => {
        if (isFocused) { totalFocusSeconds += Math.round((Date.now() - focusStart) / 1000); isFocused = false; }
    });
}

// ─── Idle detection ───────────────────────────────────────────────────────────
function startIdleDetection() {
    function resetIdle() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            track("User Idle", {
                idle_after_s:      IDLE_THRESHOLD,
                time_in_session_s: secondsInSession(),
                replay_url:        mixpanel.get_session_replay_url() || null
            });
        }, IDLE_THRESHOLD * 1000);
    }
    ["mousemove", "keydown", "click", "touchstart"].forEach(e => window.addEventListener(e, resetIdle));
    resetIdle();
}

// ─── Heartbeat ────────────────────────────────────────────────────────────────
function startHeartbeat() {
    [30, 60, 120, 180, 300].forEach(sec => {
        setTimeout(() => {
            if (!selectedEmail) return;
            track("Engagement Heartbeat", {
                elapsed_s:      sec,
                total_focus_s:  currentFocusSeconds(),
                replay_url:     mixpanel.get_session_replay_url() || null
            });
        }, sec * 1000);
    });
}

// ─── Fullscreen ───────────────────────────────────────────────────────────────
function openFullscreen() {
    track("Fullscreen Clicked", { time_in_session_s: secondsInSession() });
    const elem = document.getElementById("viewerContainer");
    if (elem.requestFullscreen) elem.requestFullscreen();
}

document.addEventListener("fullscreenchange", () => {
    track(document.fullscreenElement ? "Entered Fullscreen" : "Exited Fullscreen", {
        time_in_session_s: secondsInSession()
    });
});

// ─── Download ─────────────────────────────────────────────────────────────────
document.getElementById("downloadBtn").addEventListener("click", () => {
    track("Deck Downloaded", {
        time_in_session_s: secondsInSession(),
        replay_url:        mixpanel.get_session_replay_url() || null
    });
    mixpanel.people.increment("download_count");
});

// ─── Copy / Print ─────────────────────────────────────────────────────────────
document.addEventListener("copy", () => track("Text Copied", { time_in_session_s: secondsInSession() }));
window.addEventListener("beforeprint", () => track("Print Attempted", { time_in_session_s: secondsInSession() }));

// ─── Session end ──────────────────────────────────────────────────────────────
window.addEventListener("beforeunload", () => {
    if (!selectedEmail) return;
    const total_s = secondsInSession();
    track("Session Ended", {
        duration_s:     total_s,
        total_focus_s:  currentFocusSeconds(),
        engaged:        total_s >= 60,
        replay_url:     mixpanel.get_session_replay_url() || null
    });
    mixpanel.people.set({
        "last_session_s": total_s,
        "last_seen":      new Date().toISOString()
    });
    mixpanel.people.increment("session_count");
    mixpanel.stop_session_recording();
});

</script>
</body>
</html>
