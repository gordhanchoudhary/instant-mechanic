<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instant Mechanic — AI Car Care</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F5F0;
  --bg2:#FFFFFF;
  --bg3:#F2EDE6;
  --card:#FFFFFF;
  --card-h:#FEFAF5;
  --elev:#F5F0EA;
  --accent:#FC8019;
  --accent-d:#E06800;
  --accent-l:#FFF0E5;
  --accent-xl:#FFF8F3;
  --glow:rgba(252,128,25,.12);
  --glow2:rgba(252,128,25,.22);
  --green:#16A34A;
  --green-l:#F0FDF4;
  --red:#DC2626;
  --red-l:#FEF2F2;
  --blue:#2563EB;
  --blue-l:#EFF6FF;
  --warn:#D97706;
  --warn-l:#FFFBEB;
  --t1:#1A1204;
  --t2:#5C4A2A;
  --t3:#9E8060;
  --t4:#C4A882;
  --brd:#E8DDD0;
  --brd2:#D4C4B0;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(252,128,25,.12),0 1px 4px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(252,128,25,.18),0 2px 8px rgba(0,0,0,.08);
  --r:16px;--rs:12px;--rx:8px;
  --font:'Plus Jakarta Sans',sans-serif;
}
html,body{background:var(--bg);height:100%}
body{font-family:var(--font);color:var(--t1);overflow-x:hidden;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}

/* ── LOADING SCREEN ── */
#loadScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease}
#loadScreen.fade-out{opacity:0;pointer-events:none}
.load-icon{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,var(--accent),#FF9A40);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(252,128,25,.4);animation:float 2s ease infinite}
.load-icon svg{width:38px;height:38px;color:white}
.load-brand{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.load-brand span{color:var(--accent)}
.load-sub{font-size:13px;color:var(--t3);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:36px}
.load-bar-wrap{width:180px;height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.load-bar{height:100%;background:var(--accent);border-radius:2px;animation:loadprogress 1.8s ease forwards}
@keyframes loadprogress{from{width:0}to{width:100%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spinR{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn .4s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--elev) 25%,var(--brd) 50%,var(--elev) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* ── TYPOGRAPHY ── */
h1{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
h2{font-size:20px;font-weight:700;letter-spacing:-.3px}
h3{font-size:16px;font-weight:700}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);transition:all .2s cubic-bezier(.16,1,.3,1)}
.card-tap{cursor:pointer}
.card-tap:active{transform:scale(.98);box-shadow:none}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;align-items:center;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;cursor:pointer;color:var(--t4);transition:all .2s;background:none;border:none;font-family:var(--font);min-width:60px}
.bnav-btn.act{color:var(--accent)}
.bnav-btn svg{width:22px;height:22px;transition:transform .2s}
.bnav-btn.act svg{transform:translateY(-1px)}
.bnav-btn span{font-size:10px;font-weight:600;letter-spacing:.3px}
.bnav-dot{width:4px;height:4px;border-radius:2px;background:var(--accent);margin-top:1px;opacity:0;transition:.2s}
.bnav-btn.act .bnav-dot{opacity:1}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:17px;font-weight:700;color:var(--t1)}
.sec-link{font-size:13px;font-weight:600;color:var(--accent);cursor:pointer}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--elev);border:1px solid var(--brd);border-radius:100px;font-size:12px;color:var(--t2);font-weight:600;white-space:nowrap;font-family:var(--font)}
.chip-accent{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}
.chip-green{background:var(--green-l);border-color:var(--green);color:var(--green)}
.chip-red{background:var(--red-l);border-color:var(--red);color:var(--red)}
.chip-blue{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}

/* ── SCROLL H ── */
.scroll-h{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-h::-webkit-scrollbar{display:none}

/* ── PROGRESS ── */
.prog{height:6px;background:var(--elev);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .8s cubic-bezier(.16,1,.3,1)}

/* ── PAGE HEADER ── */
.pg-header{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.pg-back{width:38px;height:38px;border-radius:12px;background:var(--elev);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--brd);flex-shrink:0;transition:.2s}
.pg-back:active{transform:scale(.94)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--t1);color:white;padding:12px 20px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s ease;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── WA REDIRECT SCREEN ── */
#waScreen{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;z-index:999}
#waScreen.show{display:flex}
.wa-icon{width:88px;height:88px;border-radius:24px;background:linear-gradient(135deg,#25D366,#128C7E);display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 8px 32px rgba(37,211,102,.35)}
.wa-icon svg{width:44px;height:44px;color:white}
.wa-btn{width:100%;max-width:280px;padding:16px;background:#25D366;color:white;border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:.2s;margin-top:24px}
.wa-btn:hover{background:#20BD5A;transform:translateY(-1px)}

</style>
</head>
<body>

<script>
// ═══════════════════════════════════════
//  INSTANT MECHANIC — PRODUCTION ENGINE
// ═══════════════════════════════════════

const WA_ONBOARD = 'https://wa.me/message/AGMODTWZN7RZO1';
const WA_SUPPORT = '+918130377099';
const API_BASE   = 'https://ai.instantmechanic.online/bot/customer_chats/';
const LS_MOBILE  = 'im_mobile';
const LS_VISITED = 'im_visited';

// ── Helpers ──
const $  = (s,p)=>(p||document).querySelector(s);
const $$ = (s,p)=>[...(p||document).querySelectorAll(s)];

function getURLParam(k){ return new URLSearchParams(window.location.search).get(k); }

function showToast(msg,ms=2600){
  const t=$('#toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

function waMsg(text){
  const num=WA_SUPPORT.replace(/\D/g,'');
  const enc=encodeURIComponent(text);
  window.open(`https://wa.me/${num}?text=${enc}`,'_blank');
}

// ── WhatsApp redirect screen ──
function showWARedirect(){
  const ls=$('#loadScreen');ls.classList.add('fade-out');
  setTimeout(()=>{ls.style.display='none';$('#waScreen').classList.add('show');},500);
  $('#waRedirectBtn').onclick=()=>{
    localStorage.setItem(LS_VISITED,'1');
    window.location.href=WA_ONBOARD;
  };
}

// ── Load dashboard ──
let CUST = null;

async function boot(){
  // 1. Check URL param
  const urlMobile = getURLParam('mobile');
  if(urlMobile){
    const cleaned = urlMobile.replace(/\D/g,'');
    localStorage.setItem(LS_MOBILE, cleaned);
    localStorage.setItem(LS_VISITED,'1');
  }

  const storedMobile = localStorage.getItem(LS_MOBILE);
  const hasVisited   = localStorage.getItem(LS_VISITED);

  // 2. First ever visit with no mobile → WA redirect
  if(!hasVisited && !storedMobile){
    showWARedirect();
    return;
  }

  // 3. Returning visit but no mobile → WA redirect
  if(!storedMobile){
    showWARedirect();
    return;
  }

  // 4. Has mobile → hit API
  try{
    const res = await fetch(`${API_BASE}?mobile=${storedMobile}`,{
      headers:{
        'Accept':'*/*',
        'Origin':'https://instantmechanic.online',
        'Referer':'https://instantmechanic.online/'
      }
    });
    const json = await res.json();
    if(json.status==='success'&&json.data&&json.data.length>0){
      CUST = json.data[0];
    } else {
      // API returned no data — treat as new user
      CUST = {mobile:storedMobile,name:'',car:'',car_number:'',car_image:''};
    }
  }catch(e){
    // Network error — still show app with cached data
    CUST = {mobile:storedMobile,name:'',car:'',car_number:'',car_image:''};
  }

  // 5. Show app
  const ls=$('#loadScreen');
  ls.classList.add('fade-out');
  setTimeout(()=>{
    ls.style.display='none';
    $('#app').style.display='block';
    S.tab='home';
    render();
  },1800);
}

// ── State ──
const S={tab:'home'};

// ── Icons ──
const IC={
  home:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,

  wallet:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
  crown:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 20h20l-2-14-5 7-3-8-3 8-5-7z"/></svg>`,

// ── Render ──
function render(){
  const app=$('#app');
  switch(S.tab){
    case 'home':    app.innerHTML=homePage()+navBar(); break;
    case 'ai':      app.innerHTML=aiPage()+navBar(); break;
    case 'history': app.innerHTML=historyPage()+navBar(); break;
    case 'profile': app.innerHTML=profilePage()+navBar(); break;
  }
  bindNav();
  bindActions();
}

function navBar(){
  const tabs=[
    {id:'home',  ic:IC.home,    l:'Home'},
    {id:'ai',    ic:IC.brain,   l:'AI Tools'},
    {id:'history',ic:IC.history,l:'History'},
    {id:'profile',ic:IC.user,   l:'Profile'},
  ];
  return `<nav class="bnav">${tabs.map(t=>`
    <button class="bnav-btn ${S.tab===t.id?'act':''}" data-tab="${t.id}">
      ${t.ic}<span>${t.l}</span><div class="bnav-dot"></div>
    </button>`).join('')}</nav>`;
}

function bindNav(){
  $$('.bnav-btn').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;render();});
}

// ── Feature click handler ──
function bindActions(){
  $$('[data-wa]').forEach(el=>{
    el.addEventListener('click',()=>{
      const feat=el.dataset.wa;
      waMsg(feat);
    });
  });
}

    <div style="padding:16px">
      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
        ${[{l:'Total Spent',v:'₹15,098'},{l:'Services',v:'5'},{l:'Avg Cost',v:'₹3,020'}].map(s=>`
        <div class="card" style="text-align:center;padding:14px">
          <p style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${s.l}</p>
          <p style="font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--accent)">${s.v}</p>
        </div>`).join('')}
      </div>

      <!-- Timeline -->
      <div class="sec-hd"><span class="sec-title">All Records</span>
        <span class="sec-link" data-wa="Hi! I want to see my full service history for my ${car} (${carNum}). Can you pull it up?">View All</span>
      </div>
      ${records.map((r,i)=>`
      <div style="display:flex;gap:12px;margin-bottom:12px" class="fade-up" style="animation-delay:${i*.06}s">
        <div style="display:flex;flex-direction:column;align-items:center;padding-top:2px">
          <div style="width:12px;height:12px;border-radius:6px;background:${i===0?'var(--accent)':'var(--brd2)'};border:2px solid ${i===0?'var(--accent)':'var(--brd2)'};flex-shrink:0"></div>
          ${i<records.length-1?`<div style="width:2px;flex:1;background:var(--brd);min-height:40px;margin-top:3px"></div>`:''}
        </div>
        <div data-wa="Hi! I want details about my ${r.service} service from ${r.date} for my ${car}." class="card card-tap" style="flex:1;margin-bottom:0;display:flex;justify-content:space-between;align-items:center">
          <div>
            <p style="font-weight:700;font-size:14px">${r.service}</p>
            <p style="color:var(--t3);font-size:12px;margin-top:2px">${r.garage}</p>
            <p style="color:var(--t4);font-size:11px;margin-top:1px">${r.date}</p>
          </div>
          <div style="text-align:right">
            <p style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:15px">${r.cost}</p>
            <span class="chip chip-green" style="padding:3px 8px;font-size:10px;margin-top:4px;display:inline-flex">${IC.check} Done</span>
          </div>
        </div>
      </div>`).join('')}

      <button data-wa="Hi! I need to book a new service for my ${car} (${carNum}). What slots are available?" style="width:100%;padding:15px;margin-top:8px;background:var(--accent);color:white;border:none;border-radius:14px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow-md)">
        ${IC.wa} Book New Service
      </button>
    </div>
  </div>`;
}

// ═══════════════════════════════
//  PROFILE PAGE
// ═══════════════════════════════
function profilePage(){
  const name   = CUST?.name    || 'User';
  const mobile = CUST?.mobile  || '';
  const car    = CUST?.car     || '';
  const carNum = CUST?.car_number || '';
  const initial= (name&&name.trim()) ? name.trim()[0].toUpperCase() : 'U';
  const dispMob= mobile ? '+' + mobile.slice(0,2) + ' ' + mobile.slice(2,7) + ' ' + mobile.slice(7) : '';

  const menuItems=[
    {ic:IC.car,     label:'My Vehicles',    sub:car||'No car added',          msg:`Hi! I want to manage my vehicles on Instant Mechanic. My current car is ${car} (${carNum}).`},
    {ic:IC.wallet,  label:'Wallet & Prices',sub:'₹2,450 available',           msg:`Hi! I want to check my Instant Mechanic wallet balance and service prices.`},
    {ic:IC.crown,   label:'Membership',     sub:'Free Plan',                  msg:`Hi! I want to upgrade my Instant Mechanic membership. What plans are available?`},
    {ic:IC.road,    label:'Driving Score',  sub:'92 / 100 · Excellent',       msg:`Hi! I want to see my detailed driving score and improvement tips.`},
    {ic:IC.shield,  label:'Insurance',      sub:'View & analyze policy',      msg:`Hi! I want to review and analyze my car insurance for my ${car}.`},
    {ic:IC.file,    label:'Documents',      sub:'RC, Insurance, PUC',         msg:`Hi! I want to manage my car documents — RC, Insurance, PUC for my ${car} (${carNum}).`},
    {ic:IC.bell,    label:'Notifications',  sub:'Manage alerts',              msg:`Hi! I want to manage my Instant Mechanic notification preferences.`},
    {ic:IC.zap,     label:'Refer & Earn',   sub:'₹200 per referral',          msg:`Hi! I want to refer a friend to Instant Mechanic and earn rewards. How does it work?`},
  ];

  return `<div style="padding-bottom:88px;min-height:100vh;background:var(--bg)">
    <!-- Profile Header -->
    <div style="background:var(--card);border-bottom:1px solid var(--brd)">
      <div style="padding:28px 20px 20px;text-align:center">
        <div style="width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,var(--accent),#FF9A40);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 4px 20px rgba(252,128,25,.35);font-size:28px;font-weight:800;color:white">${initial}</div>
        <h2 style="font-size:20px;font-weight:800;letter-spacing:-.3px">${name||'Mechanic User'}</h2>
        ${dispMob?`<p style="color:var(--t3);font-size:13px;margin-top:3px;font-family:'JetBrains Mono',monospace">${dispMob}</p>`:''}
        ${car?`<div class="chip chip-accent" style="margin-top:10px">${IC.car} ${car}${carNum?' · '+carNum:''}</div>`:''}
      </div>
      <!-- Stats strip -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--brd);padding:14px 0">
        ${[{l:'Services',v:'5'},{l:'Savings',v:'₹1,240'},{l:'Rating',v:'4.9 ⭐'}].map(s=>`
        <div style="text-align:center;padding:0 10px;${s!=='{l:\'Services\',v:\'5\'}' ?'border-left:1px solid var(--brd)':''}">
          <p style="font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--t1)">${s.v}</p>
          <p style="font-size:11px;color:var(--t3);font-weight:600;margin-top:2px">${s.l}</p>
        </div>`).join('')}
      </div>
    </div>

    <div style="padding:16px">
      <div style="background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)">
        ${menuItems.map((m,i)=>`
        <div data-wa="${m.msg}" class="card-tap" style="display:flex;align-items:center;gap:14px;padding:15px 16px;background:var(--card);${i<menuItems.length-1?'border-bottom:1px solid var(--brd)':''}">
          <div style="width:40px;height:40px;border-radius:12px;background:var(--accent-l);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0">${m.ic}</div>
          <div style="flex:1;min-width:0">
            <p style="font-weight:700;font-size:14px">${m.label}</p>
            <p style="font-size:12px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.sub}</p>
          </div>
          <div style="color:var(--t4)">${IC.chevR}</div>
        </div>`).join('')}
      </div>

      <button onclick="logout()" style="width:100%;margin-top:16px;padding:14px;background:var(--red-l);color:var(--red);border:1px solid ${`rgba(220,38,38,.2)`};border-radius:14px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer">Sign Out</button>
      <p style="text-align:center;color:var(--t4);font-size:11px;margin-top:12px">Instant Mechanic v2.1.0 · Gurugram, India</p>
    </div>
  </div>`;
}

function logout(){
  if(confirm('Sign out of Instant Mechanic?')){
    localStorage.removeItem(LS_MOBILE);
    localStorage.removeItem(LS_VISITED);
    location.reload();
  }
}

// ── Start ──
window.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
