<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instant Mechanic — AI Car Care Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--card:#1a1a26;--card-h:#22222f;--elev:#252535;
  --accent:#00e5a0;--accent-d:#00c98c;--glow:rgba(0,229,160,.15);--glow2:rgba(0,229,160,.3);
  --warn:#ffb340;--danger:#ff4d6a;--info:#4da6ff;
  --t1:#f0f0f5;--t2:#8888a0;--t3:#55556a;
  --brd:#2a2a3a;--brd2:#353548;
  --r:14px;--rs:10px;--rx:6px;
}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--glow)}50%{box-shadow:0 0 40px var(--glow2)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fade{animation:fadeIn .45s cubic-bezier(.16,1,.3,1) both}
.slide{animation:slideIn .4s cubic-bezier(.16,1,.3,1) both}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.3s}

/* Inputs & Buttons */
.inp{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-family:'Outfit';font-size:15px;outline:none;transition:.2s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.inp::placeholder{color:var(--t3)}
.btn{width:100%;padding:16px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--rs);font-family:'Outfit';font-size:16px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.3px}
.btn:hover{background:var(--accent-d);transform:translateY(-1px);box-shadow:0 4px 20px var(--glow2)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn2{padding:12px 20px;background:var(--card);color:var(--t1);border:1px solid var(--brd);border-radius:var(--rs);font-family:'Outfit';font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
.btn2:hover{border-color:var(--accent);background:var(--card-h)}

/* Cards */
.crd{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:18px;transition:.25s;cursor:pointer}
.crd:hover{border-color:var(--brd2);background:var(--card-h);transform:translateY(-2px)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.5px}
.bg{background:rgba(0,229,160,.15);color:var(--accent)}
.bo{background:rgba(255,179,64,.15);color:var(--warn)}
.br{background:rgba(255,77,106,.15);color:var(--danger)}
.bb{background:rgba(77,166,255,.15);color:var(--info)}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--elev);border:1px solid var(--brd);border-radius:100px;font-size:13px;color:var(--t2);cursor:pointer;transition:.2s;white-space:nowrap;font-family:'Outfit'}
.chip:hover{border-color:var(--brd2)}
.chip.sel{background:var(--glow2);border-color:var(--accent);color:var(--accent)}

/* Progress */
.prog{height:6px;background:var(--elev);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 1s ease}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.scroll-h{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-h::-webkit-scrollbar{display:none}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;color:var(--t3);transition:.2s;background:none;border:none;font-family:'Outfit'}
.bnav button.act{color:var(--accent)}
.bnav button span{font-size:10px;font-weight:500}
.bnav button svg{width:20px;height:20px}

/* Section */
.sec{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* Pulse dot */
.pdot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}

/* OBD value */
.obd-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1}

/* Divider */
.div{height:1px;background:var(--brd);margin:16px 0}
</style>
</head>

// ── Render Engine ──
function render(){
  const app=$("#app");
  switch(S.page){
    case "splash": app.innerHTML=splashPage(); setTimeout(()=>{S.page="login";render()},2200); break;

function bindLogin(){

  const vb=$("#verifyBtn");if(vb)vb.onclick=()=>{S.showOTP=false;S.page="carSelect";S.step=0;render();};
  $$(".otp-box").forEach(b=>{

      const i=+b.dataset.i;S.otp[i]=b.value.slice(-1);

function bindCarSelect(){
  $$(".brandCard").forEach(b=>b.onclick=()=>{S.brand=BRANDS[+b.dataset.i];S.step=1;render();});

  const sb=$("#skipBtn");if(sb)sb.onclick=()=>{S.car={brand:S.brand.n,model:S.model,fuel:S.fuel,year:S.year,regNo:"Not Added"};S.chatMsgs=[{role:"ai",text:`Hi! I'm your AI mechanic for your ${S.car.brand} ${S.car.model}. Ask me anything!`}];nav("main");};

function bindMain(){
  $$(".navBtn").forEach(b=>b.onclick=()=>setTab(b.dataset.t));
  // Home bindings
  $$(".qaBtn").forEach(b=>b.onclick=()=>nav(b.dataset.p));
  // AI Hub bindings
  $$(".aiFeBtn").forEach(b=>b.onclick=()=>{if(b.dataset.p)nav(b.dataset.p);});
  const ci=$("#chatInp"),cs=$("#chatSend");
  if(ci&&cs){
    const send=()=>{
      if(!ci.value.trim())return;
      S.chatMsgs.push({role:"user",text:ci.value});
      const q=ci.value.toLowerCase();ci.value="";
      let r="Based on your "+S.car.brand+" "+S.car.model+", ";
      if(q.includes("brake"))r+="brake pad replacement typically costs ₹2,500-₹4,500. Front pads wear faster. Want to book an inspection?";
      else if(q.includes("oil")||q.includes("service"))r+="standard oil change runs ₹1,800-₹3,200. Synthetic oil recommended for your "+S.car.fuel+" engine.";
      else if(q.includes("ac")||q.includes("cool"))r+="AC gas top-up costs ₹1,200-₹2,000. Could also be a compressor issue (₹8,000-₹15,000).";
      else r+="I can help with repair estimates, maintenance schedules, parts pricing, and diagnostics!";
      setTimeout(()=>{S.chatMsgs.push({role:"ai",text:r});render();},600);
      render();
    };
    cs.onclick=send;ci.onkeydown=e=>{if(e.key==="Enter")send();};
  }
  // OBD
  const ob=$("#obdConnBtn");if(ob)ob.onclick=()=>{ob.textContent="🔄 Scanning...";ob.disabled=true;setTimeout(()=>{S.obdConnected=true;render();},2500);};
  // Profile links
  $$(".profLink").forEach(b=>b.onclick=()=>{if(b.dataset.p)nav(b.dataset.p);});
}

  return `<div class="slide" style="min-height:100vh">${pageHeader("Membership Plans")}<div style="padding:20px">
